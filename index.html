<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHJ LSPD | Complete Police Command System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:#070b13; color:#edf3ff; min-height:100vh; }
    body::before { content:''; position:fixed; inset:0;
      background: radial-gradient(circle at 20% 30%,rgba(47,124,255,.12),transparent 55%),
                  radial-gradient(circle at 85% 70%,rgba(243,199,90,.08),transparent 50%);
      pointer-events:none; z-index:-1; }

    .app { display:grid; grid-template-columns:280px 1fr; min-height:100vh; }
    .sidebar { background:rgba(10,15,25,.92); backdrop-filter:blur(16px);
      border-right:1px solid rgba(255,255,255,.08); padding:24px 16px;
      position:sticky; top:0; height:100vh; overflow-y:auto; z-index:10; }

    .brand { display:flex; align-items:center; gap:12px; margin-bottom:32px;
      padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,.1); }
    .brand-icon { width:48px; height:48px; background:#0b1730; border:2px solid #f3c75a;
      border-radius:50%; display:grid; place-items:center; font-size:26px; }
    .brand h1 { font-size:18px; font-weight:800; }
    .brand p  { font-size:11px; color:#8fa0bd; }

    .nav-title { font-size:11px; font-weight:800; text-transform:uppercase;
      letter-spacing:1px; color:#53617a; margin:24px 0 12px 8px; }
    .nav button { width:100%; text-align:left; background:transparent; border:none;
      color:#8fa0bd; padding:12px 16px; border-radius:14px; font-weight:600;
      display:flex; align-items:center; gap:12px; cursor:pointer; transition:.2s; margin-bottom:6px; }
    .nav button i { font-size:20px; }
    .nav button.active,.nav button:hover { background:rgba(47,124,255,.12); color:white; }

    .main { min-width:0; }
    .top-bar { height:70px; background:rgba(7,11,19,.7); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center;
      justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:10; }
    .user-info { display:flex; align-items:center; gap:16px; }
    .avatar { width:42px; height:42px; background:linear-gradient(135deg,#2f7cff,#9c4dff);
      border-radius:50%; display:grid; place-items:center; font-weight:bold; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .role-badge { background:rgba(243,199,90,.15); border:1px solid rgba(243,199,90,.3);
      border-radius:40px; padding:4px 12px; font-size:12px; font-weight:600; color:#f3c75a; }

    .content { padding:28px 32px; max-width:1600px; }
    .page { display:none; animation:fadeIn .25s ease; }
    .page.active { display:block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .card { background:rgba(16,24,39,.8); backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,.08); border-radius:24px; overflow:hidden; margin-bottom:28px; }
    .card-header { padding:18px 24px; border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    .card-header h3 { font-size:18px; font-weight:700; }
    .card-body { padding:24px; }

    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:32px; }
    .stat-card { background:rgba(16,24,39,.6); border:1px solid rgba(255,255,255,.08);
      border-radius:20px; padding:20px; text-align:center; transition:.2s; }
    .stat-card i { font-size:32px; color:#2f7cff; margin-bottom:12px; }
    .stat-card .value { font-size:32px; font-weight:800; }
    .stat-card .label { color:#8fa0bd; font-size:13px; margin-top:4px; }

    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:14px 8px; border-bottom:1px solid rgba(255,255,255,.06); }
    th { color:#8fa0bd; font-weight:600; font-size:12px; text-transform:uppercase; }

    .officer-row { display:flex; justify-content:space-between; align-items:center;
      padding:14px 0; border-bottom:1px solid rgba(255,255,255,.08); }
    .officer-row:last-child { border-bottom:none; }
    .divider { height:1px; background:rgba(255,255,255,.06); margin:12px 0; }

    .btn { border:none; border-radius:12px; padding:8px 16px; font-weight:600; cursor:pointer;
      display:inline-flex; align-items:center; gap:8px; transition:.2s;
      background:rgba(255,255,255,.05); color:white; }
    .btn-primary { background:linear-gradient(135deg,#2f7cff,#7258ff); }
    .btn-danger  { background:rgba(255,90,103,.2); color:#ff5a67; border:1px solid rgba(255,90,103,.3); }
    .btn-warning { background:rgba(243,199,90,.15); color:#f3c75a; border:1px solid rgba(243,199,90,.3); }
    .btn-success { background:rgba(46,204,113,.15); color:#2ecc71; border:1px solid rgba(46,204,113,.3); }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }

    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:6px; font-size:13px; font-weight:600; color:#8fa0bd; }
    input,select,textarea { width:100%; background:#0b1220; border:1px solid rgba(255,255,255,.12);
      border-radius:14px; padding:12px 14px; color:white; font-family:inherit; }
    textarea { resize:vertical; min-height:80px; }

    .modal { position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(8px);
      display:none; place-items:center; z-index:1000; }
    .modal.open { display:grid; }
    .modal-content { background:#101827; border:1px solid rgba(255,255,255,.1);
      border-radius:28px; width:min(650px,90%); max-height:85vh; overflow-y:auto; }
    .modal-header,.modal-footer { padding:18px 24px; border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; justify-content:space-between; align-items:center; }
    .modal-footer { border-bottom:none; border-top:1px solid rgba(255,255,255,.08); justify-content:flex-end; gap:12px; }
    .modal-body { padding:24px; }

    .toast { position:fixed; bottom:24px; left:24px; background:#1b2942;
      border-left:4px solid #2f7cff; padding:12px 20px; border-radius:12px;
      display:none; z-index:1100; box-shadow:0 8px 24px rgba(0,0,0,.3); }
    .toast.show { display:block; }

    .login-container { min-height:100vh; display:grid; place-items:center; padding:24px; }
    .login-card { max-width:460px; background:linear-gradient(145deg,#101827,#070b13);
      border:1px solid rgba(255,255,255,.1); border-radius:32px; padding:40px 32px;
      text-align:center; box-shadow:0 24px 48px rgba(0,0,0,.4); }

    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,.2);
      border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-active  { background:rgba(46,204,113,.15); color:#2ecc71; }
    .badge-inactive{ background:rgba(255,90,103,.15); color:#ff5a67; }
    .badge-info    { background:rgba(52,152,219,.15); color:#3498db; }
    .badge-warning { background:rgba(243,199,90,.15); color:#f3c75a; }
    .badge-danger  { background:rgba(255,90,103,.15); color:#ff5a67; }

    .points-bar { height:6px; background:#1b2942; border-radius:99px; overflow:hidden; margin-top:4px; }
    .points-bar-fill { height:100%; background:linear-gradient(90deg,#2f7cff,#7258ff); border-radius:99px; }

    .mobile-menu { display:none; }

    /* ── Drag & Drop ── */
    .drag-handle { cursor:grab; color:#53617a; padding:0 8px; font-size:18px; user-select:none; transition:.15s; }
    .drag-handle:hover { color:#8fa0bd; }
    .drag-handle:active { cursor:grabbing; }
    .dragging { opacity:.45; background:rgba(47,124,255,.08) !important; border:2px dashed rgba(47,124,255,.4) !important; border-radius:14px; }
    .drag-over { border-top:2px solid #2f7cff !important; }

    @media(max-width:800px){
      .app { grid-template-columns:1fr; }
      .sidebar { position:fixed; right:-280px; transition:.2s; height:100vh; z-index:20; }
      .sidebar.open { right:0; }
      .mobile-menu { display:inline-flex; }
      .stats-grid { grid-template-columns:1fr 1fr; }
      .content { padding:20px; }
    }
  </style>
</head>
<body>

<div id="loginContainer" class="login-container">
  <div class="login-card">
    <div style="width:80px;height:80px;background:#0b1730;border:2px solid #f3c75a;border-radius:50%;display:grid;place-items:center;font-size:40px;margin:0 auto 20px">🛡️</div>
    <h1 style="font-size:28px;font-weight:900">SHJ LSPD</h1>
    <p style="color:#8fa0bd;margin:8px 0 24px">Complete Police Management System</p>
    <button id="discordLoginBtn" class="btn btn-primary" style="width:100%;justify-content:center">
      <i class="ti ti-brand-discord"></i> Login with Discord
    </button>
    <p id="loginMessage" style="margin-top:16px;font-size:13px;color:#8fa0bd"></p>
  </div>
</div>

<div id="appContainer" class="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div><h1>SHJ LSPD</h1><p>Command Center</p></div>
    </div>
    <nav class="nav">
      <div class="nav-title">Main</div>
      <button class="active" data-page="dashboard"><i class="ti ti-dashboard"></i> Dashboard</button>
      <button data-page="officers"><i class="ti ti-users"></i> Officers</button>
      <button data-page="ranks"><i class="ti ti-stairs-up"></i> Ranks</button>
      <button data-page="points"><i class="ti ti-chart-bar"></i> Points Logs</button>
      <button data-page="laws"><i class="ti ti-book"></i> Laws & Rules</button>
      <button data-page="uniform"><i class="ti ti-shirt"></i> Uniform Guide</button>
      <button data-page="codes"><i class="ti ti-radio"></i> Police Codes</button>
      <button data-page="wanted"><i class="ti ti-car"></i> Wanted & Impound</button>
      <button data-page="cases"><i class="ti ti-folder"></i> Cases</button>
      <button data-page="reports"><i class="ti ti-file-text"></i> Reports</button>
      <div class="nav-title">Administration</div>
      <button data-page="discordUsers"><i class="ti ti-brand-discord"></i> Discord Users</button>
      <button data-page="logs"><i class="ti ti-history"></i> System Logs</button>
      <button data-page="settings"><i class="ti ti-settings"></i> Settings</button>
      <button data-page="adminRoles" data-owner-only style="display:none"><i class="ti ti-shield-lock"></i> Admin Roles</button>
    </nav>
  </aside>

  <main class="main">
    <div class="top-bar">
      <button class="btn mobile-menu" id="mobileMenuBtn"><i class="ti ti-menu-2"></i></button>
      <div><b>Control Panel</b><div id="clock" style="font-size:12px;color:#8fa0bd"></div></div>
      <div class="user-info">
        <div class="avatar" id="userAvatar">U</div>
        <div><b id="userName">User</b><div id="userRole" class="role-badge">Officer</div></div>
        <button id="logoutBtn" class="btn" style="background:rgba(255,90,103,.15);color:#ff5a67">
          <i class="ti ti-logout"></i> Logout
        </button>
      </div>
    </div>
    <div class="content">
      <div id="dashboard"    class="page active"></div>
      <div id="officers"     class="page"></div>
      <div id="ranks"        class="page"></div>
      <div id="points"       class="page"></div>
      <div id="laws"         class="page"></div>
      <div id="uniform"      class="page"></div>
      <div id="codes"        class="page"></div>
      <div id="wanted"       class="page"></div>
      <div id="cases"        class="page"></div>
      <div id="reports"      class="page"></div>
      <div id="discordUsers" class="page"></div>
      <div id="logs"         class="page"></div>
      <div id="settings"     class="page"></div>
      <div id="adminRoles"   class="page"></div>
    </div>
  </main>
</div>

<div id="globalModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="btn btn-sm" id="closeModalBtn">✕</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" id="modalCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>
<div id="toastMessage" class="toast"></div>

<script>
(function(){
  // ═══════════════════════════ CONFIG ═══════════════════════════
  const CFG = {
    WORKER_URL:        'https://lspd.oabbmb.workers.dev',
    DISCORD_CLIENT_ID: '1505897669334138940',
    GUILD_ID:          '1154498662286770179',
  };

  // ═══════════════════════════ STATE ════════════════════════════
  let currentUser = null;
  let isAdmin     = false;
  let isOwner     = false;
  let accessToken = null;
  let store = {
    officers:[], ranks:[], pointsLog:[], laws:[], uniforms:[],
    codes:[], wanted:[], impound:[], cases:[], reports:[],
    users:[], activity:[], settings:{ webhookUrl:'', logsEnabled:true },
    adminRoles:[], webhooks:{}, permissions:[], nicknames:{}
  };

  // ── Nickname helpers ──
  function getNick(userId, fallback){ return (store.nicknames && store.nicknames[userId]) || fallback || userId || '-'; }
  function getCurrentUserDisplay(){ return getNick(currentUser?.id, currentUser?.username); }

  // ═══════════════════════════ UTILS ════════════════════════════
  const qs  = (s,p=document) => p.querySelector(s);
  const qsa = (s,p=document) => [...p.querySelectorAll(s)];
  function esc(str){ return String(str??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }
  function toast(msg,color='#2f7cff'){
    const t=qs('#toastMessage');
    if(t){ t.textContent=msg; t.style.borderLeftColor=color; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),3000); }
  }
  function fmtTime(ts){ return ts ? new Date(ts).toLocaleString('en-US') : '-'; }

  // ═══════════════════════════ DRAG & DROP ENGINE ═══════════════════════════
  function initDnD(tableBodyId, collection, onReorder) {
    const tbody = document.getElementById(tableBodyId);
    if (!tbody) return;
    let dragged = null;
    tbody.querySelectorAll('tr[data-id]').forEach(row => {
      row.setAttribute('draggable', 'true');
      row.addEventListener('dragstart', e => {
        dragged = row;
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      row.addEventListener('dragend', () => {
        row.classList.remove('dragging');
        tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
        dragged = null;
      });
      row.addEventListener('dragover', e => {
        e.preventDefault();
        if (dragged && row !== dragged) {
          tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
          row.classList.add('drag-over');
        }
      });
      row.addEventListener('drop', async e => {
        e.preventDefault();
        if (!dragged || dragged === row) return;
        row.classList.remove('drag-over');
        const rows = [...tbody.querySelectorAll('tr[data-id]')];
        const fromIdx = rows.indexOf(dragged);
        const toIdx   = rows.indexOf(row);
        if (fromIdx === -1 || toIdx === -1) return;
        rows.splice(fromIdx, 1);
        rows.splice(toIdx, 0, dragged);
        rows.forEach(r => tbody.appendChild(r));
        const newOrder = rows.map(r => Number(r.dataset.id));
        const endpoint = collection === 'ranks' ? '/api/ranks/reorder' : '/api/reorder';
        const body = collection === 'ranks' ? { order: newOrder } : { collection, order: newOrder };
        const res = await api('POST', endpoint, body);
        if (res.ok) {
          if (collection === 'ranks') store.ranks = res.data;
          else if (store[collection]) store[collection] = res.data;
          if (onReorder) onReorder();
          toast('Order saved ✓', '#2ecc71');
        } else {
          toast('Reorder failed', '#ff5a67');
          if (onReorder) onReorder(); // re-render to restore
        }
      });
    });
  }

  // ═══════════════════════════ API ENGINE ══════════════════════════
  async function api(method, path, body=null){
    const opts = { method, headers: { 'Content-Type':'application/json' } };
    if(accessToken) opts.headers['Authorization'] = 'Bearer '+accessToken;
    if(body) opts.body = JSON.stringify(body);
    try {
      const res = await fetch(CFG.WORKER_URL + path, opts);
      let data;
      try { data = await res.json(); } catch(e) { return { ok:false, reason:'invalid_json_response' }; }
      if(!data.ok && data.reason) console.warn('API warn:', data.reason);
      // ✅ FIX: If server returns 403 missing_role — role was revoked, clear session immediately
      if(res.status === 403 && (data.error === 'missing_role' || data.reason === 'forbidden_admin_only')){
        console.warn('[API] 403 received — re-validating session to detect role changes');
        const valid = await validateSessionWithServer();
        if(!valid){ clearSession(); location.reload(); return data; }
        // If still valid but not admin, update UI
        bootApp();
      }
      return data;
    } catch(e){ console.error('API error:', e); return { ok:false, reason: e.message }; }
  }

  async function loadAllData(){
    const data = await api('GET', '/api/data');
    if(data.ok){
      ['officers','ranks','pointsLog','laws','uniforms','codes',
       'wanted','impound','cases','reports','users','activity','settings'
      ].forEach(k => { if(data[k] !== undefined) store[k] = data[k]; });
    }
    // Load nicknames
    const nickRes = await api('GET', '/api/nicknames');
    if(nickRes.ok) store.nicknames = nickRes.data || {};
    // Load logo
    const logoRes = await api('GET', '/api/logo');
    if(logoRes.ok && logoRes.data) applyLogo(logoRes.data);
    // تحميل adminRoles إذا كان owner
    if(isOwner){
      const arRes = await api('GET','/api/admin-roles');
      if(arRes.ok) store.adminRoles = arRes.data;
      const whRes = await api('GET','/api/webhooks');
      if(whRes.ok) store.webhooks = whRes.data;
    } else if(isAdmin){
      const whRes = await api('GET','/api/webhooks');
      if(whRes.ok) store.webhooks = whRes.data;
    }
  }

  // ═══════════════════════════ SESSION ══════════════════════════
  function saveSession(user,admin,token,owner=false){
    localStorage.setItem('lspd_session', JSON.stringify({ user, isAdmin:admin, isOwner:owner, token, ts:Date.now() }));
    currentUser=user; isAdmin=admin; isOwner=owner; accessToken=token;
  }
  function loadSession(){
    try {
      const s = JSON.parse(localStorage.getItem('lspd_session')||'null');
      if(!s) return false;
      if(Date.now()-s.ts > 12*3600*1000){ localStorage.removeItem('lspd_session'); return false; }
      currentUser=s.user; isAdmin=s.isAdmin; isOwner=s.isOwner||false; accessToken=s.token;
      return true;
    } catch{ return false; }
  }
  function clearSession(){ localStorage.removeItem('lspd_session'); currentUser=null; isAdmin=false; isOwner=false; accessToken=null; }

  async function validateSessionWithServer(){
    if(!accessToken){
      console.warn('[Auth] validateSessionWithServer: no accessToken — skipping');
      return false;
    }
    console.log('[Auth] Validating session with server — user:', currentUser?.id);
    try {
      const r = await api('GET', '/api/me');
      if(!r.ok){
        console.warn('[Auth] /api/me returned not ok:', r.error || r.reason);
        if(r.error === 'unauthorized' || r.reason === 'unauthorized' ||
           r.error === 'missing_role' || r.error === 'not_in_guild') {
          console.warn('[Auth] Access revoked — clearing session immediately');
          clearSession();
        }
        return false;
      }
      // ✅ FIX: ALWAYS override local isAdmin/isOwner with live server values — never trust localStorage cache
      const serverIsAdmin = r.isAdmin === true;
      const serverIsOwner = r.isOwner === true;
      if(isAdmin !== serverIsAdmin || isOwner !== serverIsOwner){
        console.warn(`[Auth] Role change detected! Local: isAdmin=${isAdmin} isOwner=${isOwner} → Server: isAdmin=${serverIsAdmin} isOwner=${serverIsOwner}`);
        console.warn('[Auth] Applying server role state immediately');
      }
      isAdmin = serverIsAdmin;
      isOwner = serverIsOwner;
      if(currentUser) currentUser = { ...currentUser, ...(r.user || {}) };
      // ✅ FIX: Save updated session with LIVE server values — overwrite any stale data
      saveSession(currentUser, isAdmin, accessToken, isOwner);
      console.log('[Auth] Server validation OK — isAdmin:', isAdmin, '| isOwner:', isOwner);
      return true;
    } catch(e){
      console.error('[Auth] Session validation network error (keeping session):', e.message);
      // Network failure — keep existing session to avoid false logout
      return true;
    }
  }

  // ═══════════════════════════ DISCORD OAUTH ════════════════════
  function loginDiscord() {
    const redirectUri = 'https://lspd.oabbmb.workers.dev/api/auth/callback';
    const clientId = '1505897669334138940';
    const scope = 'identify guilds guilds.members.read';

    const params = new URLSearchParams({
      client_id: clientId,
      redirect_uri: redirectUri,
      response_type: 'code',
      scope: scope,
    });

    location.href = 'https://discord.com/oauth2/authorize?' + params.toString();
  }

  async function handleOAuth() {
    const params = new URLSearchParams(location.search);
    const token      = params.get('access_token');
    const userParam  = params.get('user');
    const isAdminParam = params.get('isAdmin');
    const isOwnerParam = params.get('isOwner');
    const authError  = params.get('auth_error');
    const errorDesc  = params.get('error_desc');

    // ✅ إذا رجع auth_error من الـ Worker — أظهره مباشرة
    if (authError) {
      console.warn('[Auth] OAuth returned error:', authError, '—', errorDesc);
      history.replaceState({}, '', location.pathname);
      const msgEl = qs('#loginMessage');
      if (msgEl) {
        const msgs = {
          not_in_guild:        'You are not in the required Discord server.',
          missing_role:        'You do not have the required role in the server.',
          server_misconfigured: 'Server configuration error. Contact admin.',
          invalid_bot_token:   'Bot token error. Contact admin.',
          bot_permission_denied: 'Bot permission error. Contact admin.',
          unauthorized:        'Access denied. Missing required role.',
        };
        msgEl.textContent = msgs[authError] || ('Access denied: ' + (errorDesc || authError));
        msgEl.style.color = '#ff5a67';
      }
      return false;
    }

    if (!token || !userParam) return false;

    // ✅ حفظ الـ session أولاً قبل أي شيء آخر
    let user;
    try {
      user = JSON.parse(decodeURIComponent(userParam));
    } catch (e) {
      console.error('[Auth] Failed to parse user data from OAuth redirect:', e);
      return false;
    }

    const admin = isAdminParam === 'true';
    const owner = isOwnerParam === 'true';
    console.log('[Auth] OAuth success — User authenticated:', user.id, '|', user.username);
    console.log('[Auth] isAdmin:', admin, '| isOwner:', owner, '| token length:', token.length);

    // ✅ حفظ الـ session في localStorage قبل history.replaceState
    saveSession(user, admin, token, owner);
    console.log('[Auth] Session created and saved to localStorage');

    // ✅ مسح الـ URL params بعد الحفظ
    history.replaceState({}, '', location.pathname);
    console.log('[Auth] URL cleaned up');

    return true;
  }

  // ── Div-based DnD (for laws etc.) ──
  function initDnDDiv(containerId, collection, onReorder) {
    const container = document.getElementById(containerId);
    if (!container) return;
    let dragged = null;
    container.querySelectorAll('[data-id]').forEach(el => {
      el.setAttribute('draggable', 'true');
      el.addEventListener('dragstart', e => {
        dragged = el;
        setTimeout(() => el.classList.add('dragging'), 0);
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        container.querySelectorAll('[data-id]').forEach(r => r.classList.remove('drag-over'));
        dragged = null;
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        if (dragged && el !== dragged) {
          container.querySelectorAll('[data-id]').forEach(r => r.classList.remove('drag-over'));
          el.classList.add('drag-over');
        }
      });
      el.addEventListener('drop', async e => {
        e.preventDefault();
        if (!dragged || dragged === el) return;
        el.classList.remove('drag-over');
        const items = [...container.querySelectorAll('[data-id]')];
        const fromIdx = items.indexOf(dragged);
        const toIdx   = items.indexOf(el);
        if (fromIdx === -1 || toIdx === -1) return;
        items.splice(fromIdx, 1);
        items.splice(toIdx, 0, dragged);
        // Re-insert into DOM (skip divider siblings)
        items.forEach(i => {
          container.appendChild(i);
          const next = i.nextElementSibling;
          if (next && next.classList.contains('divider')) container.appendChild(next);
        });
        const newOrder = items.map(i => Number(i.dataset.id));
        const res = await api('POST', '/api/reorder', { collection, order: newOrder });
        if (res.ok) {
          if (store[collection]) store[collection] = res.data;
          toast('Order saved ✓', '#2ecc71');
        } else {
          toast('Reorder failed', '#ff5a67');
          if (onReorder) onReorder();
        }
      });
    });
  }

  window.revokeUserAccess = async (userId, displayName) => {
    if(!confirm(`Revoke access for "${displayName}"?\n\nThis will:\n• Delete their nickname\n• Remove them from all admin roles\n• Block future login\n\nThis cannot be undone.`)) return;
    const r = await api('DELETE', '/api/users/revoke', { userId });
    if(r.ok){
      // Remove from local store
      store.users = (store.users||[]).filter(u=>u.id!==userId);
      if(store.nicknames) delete store.nicknames[userId];
      // Remove from adminRoles
      if(store.adminRoles){
        store.adminRoles = store.adminRoles.map(role=>({
          ...role, members:(role.members||[]).filter(m=>m!==userId)
        }));
      }
      renderDiscordUsers(); toast(`Access revoked for ${displayName}`,'#ff5a67');
    } else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  window.previewLogo = () => {

    else toast('Error: '+(r.reason||'failed'),'#ff5a67');

  window.removeLogo = async () => {
    const r = await api('PUT', '/api/logo', { url: '' });
    if(r.ok){ store._logoUrl = ''; applyLogo(''); renderSettings(); toast('Logo removed','#ff5a67'); }

  window.saveWebhooks = async () => {
    const wh = store.webhooks || {};
    const keys = ['login','logout','reports','cases','admin','database'];
    const payload = {};
    keys.forEach(k=>{
      payload[k] = {
        url: qs(`#whUrl_${k}`)?.value?.trim() || '',
        enabled: qs(`#whEnabled_${k}`)?.checked !== false
      };
    });
    const r = await api('PUT','/api/webhooks', payload);
    if(r.ok){ store.webhooks = r.data; toast('Webhooks saved ✓'); }
    else toast('Error: '+(r.reason||'failed'),'#ff5a67');

  window.downloadBackup = async () => {
    const res = await fetch(`${CFG.WORKER_URL}/api/database/backup`, { headers: { Authorization: 'Bearer '+accessToken } });
    if(!res.ok){ toast('Backup failed','#ff5a67'); return; }
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'database_backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('Backup downloaded ✓','#2ecc71');

  window.resetDatabase = async () => {

  // ═══════════════════════════ ADMIN ROLES (OWNER ONLY) ════════════════════════════

  const ALL_PERMISSIONS = [
    'access_panel','view_dashboard',
    'create_reports','edit_reports','delete_reports',
    'create_cases','edit_cases','delete_cases',
    'manage_points','view_logs','manage_logs',
    'manage_users','manage_settings','manage_database',
    'manage_roles','manage_webhooks','full_access'

  const PERM_GROUPS = [

    { label:'Reports', icon:'ti-file-text', color:'#2ecc71',
      perms:['create_reports','edit_reports','delete_reports'] },
    { label:'Cases', icon:'ti-folder', color:'#f3c75a',

  function renderAdminRoles(){
    if(!isOwner){ qs('#adminRoles').innerHTML = '<div class="card"><div class="card-body"><p style="color:#ff5a67;text-align:center">Access denied — Owner only.</p></div></div>'; return; }
    const roles = store.adminRoles || [];
    const rows = roles.map(r=>`
      <div style="border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 20px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
          <div>
            <b style="font-size:15px">${esc(r.name||'')}</b>
            <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px">
              ${(r.permissions||[]).map(p=>`<span class="badge" style="font-size:10px;background:${PERM_COLOR[p]||'#3498db'}22;color:${PERM_COLOR[p]||'#3498db'};border:1px solid ${PERM_COLOR[p]||'#3498db'}44">${esc(p)}</span>`).join('')}
            </div>
            ${r.members?.length?`<div style="margin-top:6px;color:#8fa0bd;font-size:12px">Members: ${esc(r.members.join(', '))}</div>`:''}
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm btn-warning" onclick="openAdminRoleModal(${r.id})"><i class="ti ti-edit"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteAdminRole(${r.id})"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>`).join('');
    qs('#adminRoles').innerHTML = `
      <div class="card">
        <div class="card-header">
          <h3><i class="ti ti-shield-lock"></i> Admin Roles Management</h3>
          <button class="btn btn-primary" onclick="openAdminRoleModal()"><i class="ti ti-plus"></i> Create Role</button>
        </div>
        <div class="card-body">
          ${rows||'<p style="color:#8fa0bd;text-align:center">No custom roles created yet.</p>'}
        </div>
      </div>`;
  }

  window.deleteAdminRole = async id => {
    if(!confirm('Delete this admin role?')) return;
    // ✅ FIX: Get the role before deleting to check if current user is a member
    const roleToDelete = (store.adminRoles||[]).find(x=>x.id===id);
    const r = await api('DELETE','/api/admin-roles',{ id });
    if(r.ok){
      store.adminRoles=(store.adminRoles||[]).filter(x=>x.id!==id);
      renderAdminRoles();
      toast('Role deleted','#ff5a67');
      // ✅ FIX: If current user was a member of this role, re-validate their session immediately
      if(roleToDelete?.members?.includes(currentUser?.id)){
        console.warn('[AdminRoles] Current user was in deleted role — re-validating session');
        const valid = await validateSessionWithServer();
        if(!valid){ clearSession(); location.reload(); return; }
        bootApp(); // ✅ Re-render UI with updated permissions
      }
    } else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  window.openAdminRoleModal = (id=null) => {
    if(!isOwner){ toast('Owner only','#ff5a67'); return; }
    const role = id ? (store.adminRoles||[]).find(r=>r.id===id) : null;
    qs('#modalTitle').textContent = id ? 'Edit Admin Role' : 'Create Admin Role';

    // Build current members display from KV users
    const currentMembers = role?.members || [];
    let selectedMembers = [...currentMembers];

    function renderMembersList() {
      return selectedMembers.map(mid => {
        const u = (store.users||[]).find(x=>x.id===mid);
        const display = getNick(mid, u?.username || mid);
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(47,124,255,.08);border:1px solid rgba(47,124,255,.2);border-radius:10px;margin-bottom:6px" data-member="${esc(mid)}">
          ${u?.avatar?`<img src="${esc(u.avatar)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover">`:'<div style="width:28px;height:28px;border-radius:50%;background:#1b2942;display:grid;place-items:center;font-size:11px;font-weight:700">${esc((display)[0]?.toUpperCase()||'?')}</div>'}
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${esc(display)}</div>
            <div style="font-size:11px;color:#53617a">${esc(mid)}</div>
          </div>
          <button class="btn btn-sm btn-danger" style="padding:4px 8px" onclick="window._removeAdminMember('${esc(mid)}')"><i class="ti ti-x"></i></button>
        </div>`;
      }).join('') || '<p style="color:#53617a;font-size:13px;text-align:center;padding:12px">No members added yet</p>';
    }

    qs('#modalBody').innerHTML = `
      <div class="form-group"><label>Role Name</label><input id="arName" value="${esc(role?.name||'')}" placeholder="e.g. Supervisor"></div>
      <div class="form-group">
        <label>Add Members</label>
        <div style="position:relative">
          <input id="arMemberSearch" placeholder="Search by Discord username..." autocomplete="off" style="padding-right:40px">
          <div id="arSearchResults" style="position:absolute;top:100%;left:0;right:0;background:#101827;border:1px solid rgba(255,255,255,.12);border-radius:14px;z-index:100;max-height:220px;overflow-y:auto;display:none;margin-top:4px;box-shadow:0 12px 32px rgba(0,0,0,.4)"></div>
        </div>
        <p style="font-size:11px;color:#53617a;margin-top:4px">Search Discord server members and click to add.</p>
      </div>
      <div class="form-group">
        <label>Current Members</label>
        <div id="arMembersList" style="min-height:40px">${renderMembersList()}</div>
      </div>
      <div class="form-group"><label>Permissions</label>
        <div style="display:grid;gap:12px;margin-top:8px">
          ${PERM_GROUPS.map(g=>`
            <div style="border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                <i class="ti ${g.icon}" style="color:${g.color};font-size:16px"></i>
                <b style="font-size:13px;color:${g.color}">${g.label}</b>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                ${g.perms.map(p=>`
                  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.03);transition:.15s" onmouseover="this.style.background='rgba(255,255,255,.07)'" onmouseout="this.style.background='rgba(255,255,255,.03)'">
                    <input type="checkbox" value="${p}" ${(role?.permissions||[]).includes(p)?'checked':''} class="ar-perm" style="width:auto;padding:0;margin:0">
                    <span style="flex:1">${p.replace(/_/g,' ')}</span>
                    <span style="width:8px;height:8px;border-radius:50%;background:${PERM_COLOR[p]||'#8fa0bd'};flex-shrink:0"></span>
                  </label>`).join('')}
              </div>
            </div>`).join('')}
        </div>
      </div>`;

    // ── Member search live ──
    window._selectedAdminMembers = selectedMembers;
    window._removeAdminMember = (mid) => {
      window._selectedAdminMembers = window._selectedAdminMembers.filter(m=>m!==mid);
      const list = qs('#arMembersList');
      if(list) list.innerHTML = window._selectedAdminMembers.map(m=>{
        const u=(store.users||[]).find(x=>x.id===m);
        const display=getNick(m,u?.username||m);
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(47,124,255,.08);border:1px solid rgba(47,124,255,.2);border-radius:10px;margin-bottom:6px" data-member="${esc(m)}">
          ${u?.avatar?`<img src="${esc(u.avatar)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover">`:'<div style="width:28px;height:28px;border-radius:50%;background:#1b2942;display:grid;place-items:center;font-size:11px;font-weight:700">'+esc(display[0]?.toUpperCase()||'?')+'</div>'}
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(display)}</div><div style="font-size:11px;color:#53617a">${esc(m)}</div></div>
          <button class="btn btn-sm btn-danger" style="padding:4px 8px" onclick="window._removeAdminMember('${esc(m)}')"><i class="ti ti-x"></i></button>
        </div>`;
      }).join('') || '<p style="color:#53617a;font-size:13px;text-align:center;padding:12px">No members added yet</p>';
    };

    let searchTimeout;
    const searchInput = qs('#arMemberSearch');
    const resultsDiv  = qs('#arSearchResults');
    if(searchInput && resultsDiv) {
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        const q = searchInput.value.trim();
        if(!q){ resultsDiv.style.display='none'; return; }
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<div style="padding:12px;color:#53617a;font-size:13px;text-align:center"><span class="spinner"></span></div>';
        searchTimeout = setTimeout(async () => {
          const res = await api('GET', `/api/discord/members?q=${encodeURIComponent(q)}`);
          if(!res.ok){ resultsDiv.innerHTML='<div style="padding:12px;color:#ff5a67;font-size:13px;text-align:center">Search failed</div>'; return; }
          const members = res.data || [];
          if(!members.length){ resultsDiv.innerHTML='<div style="padding:12px;color:#53617a;font-size:13px;text-align:center">No members found</div>'; return; }
          resultsDiv.innerHTML = members.map(m=>`
            <div onclick="window._addAdminMember(${JSON.stringify(m)})" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:.15s;border-bottom:1px solid rgba(255,255,255,.06)" onmouseover="this.style.background='rgba(47,124,255,.1)'" onmouseout="this.style.background=''">
              <img src="${esc(m.avatar)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600">${esc(m.displayName)}</div>
                <div style="font-size:11px;color:#53617a">@${esc(m.username)} · ${esc(m.id)}</div>
              </div>
              ${window._selectedAdminMembers.includes(m.id)?'<span style="font-size:11px;color:#2ecc71;font-weight:700">✓ Added</span>':''}
            </div>`).join('');
        }, 400);
      });
      document.addEventListener('click', (e) => {
        if(!resultsDiv.contains(e.target) && e.target !== searchInput) resultsDiv.style.display='none';
      }, { once: true });
    }

    window._addAdminMember = (member) => {
      if(window._selectedAdminMembers.includes(member.id)){ toast('Already added','#f3c75a'); return; }
      window._selectedAdminMembers.push(member.id);
      // Merge into store.users for display
      if(!(store.users||[]).find(u=>u.id===member.id)){
        store.users = store.users || [];
        store.users.push({ id:member.id, username:member.username, avatar:member.avatar });
      }
      const list = qs('#arMembersList');
      if(list){
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(47,124,255,.08);border:1px solid rgba(47,124,255,.2);border-radius:10px;margin-bottom:6px';
        div.setAttribute('data-member', member.id);
        div.innerHTML = `<img src="${esc(member.avatar)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(member.displayName)}</div><div style="font-size:11px;color:#53617a">${esc(member.id)}</div></div>
          <button class="btn btn-sm btn-danger" style="padding:4px 8px" onclick="window._removeAdminMember('${esc(member.id)}')"><i class="ti ti-x"></i></button>`;
        const empty = list.querySelector('p');
        if(empty) empty.remove();
        list.appendChild(div);
      }
      const resultsDiv2 = qs('#arSearchResults');
      if(resultsDiv2) resultsDiv2.style.display='none';
      const si = qs('#arMemberSearch');
      if(si) si.value = '';
      toast(`${member.displayName} added ✓`, '#2ecc71');
    };

    qs('#modalConfirmBtn').onclick = async () => {
      const name = qs('#arName').value.trim();
      if(!name){ toast('Name required','#ff5a67'); return; }
      const members = window._selectedAdminMembers || [];
      const permissions = [...document.querySelectorAll('.ar-perm:checked')].map(c=>c.value);
      const payload = { name, members, permissions };
      const existingRole = id ? (store.adminRoles||[]).find(r=>r.id===id) : null;
      const currentUserWasInRole = existingRole?.members?.includes(currentUser?.id);
      const currentUserRevoked = currentUserWasInRole && !members.includes(currentUser?.id);
      if(id){
        const r = await api('PUT','/api/admin-roles',{ id, ...payload });
        if(r.ok){ const idx=(store.adminRoles||[]).findIndex(x=>x.id===id); if(idx!==-1) store.adminRoles[idx]=r.data; }
        else { toast('Error: '+(r.reason||'failed'),'#ff5a67'); return; }
      } else {
        const r = await api('POST','/api/admin-roles', payload);
        if(r.ok){ store.adminRoles=store.adminRoles||[]; store.adminRoles.push(r.data); }
        else { toast('Error: '+(r.reason||'failed'),'#ff5a67'); return; }
      }
      renderAdminRoles(); closeModal(); toast('Saved ✓');
      if(currentUserRevoked){
        const valid = await validateSessionWithServer();
        if(!valid){ clearSession(); location.reload(); return; }
        bootApp();
        navigate('dashboard');
        toast('Your admin role was updated — permissions refreshed','#f3c75a');
      }
    };
    openModal();
  };

  // ═══════════════════════════ INITIALIZATION ═══════════════════════════
  async function init(){
    const loginBtn = qs('#discordLoginBtn');
    if(loginBtn) loginBtn.onclick = loginDiscord;

    const logoutBtn = qs('#logoutBtn');
    if(logoutBtn) logoutBtn.onclick = () => { clearSession(); location.reload(); };

    const mobileBtn = qs('#mobileMenuBtn');
    if(mobileBtn) mobileBtn.onclick = () => qs('#sidebar')?.classList.toggle('open');

    const closeBtn = qs('#closeModalBtn');
    if(closeBtn) closeBtn.onclick = window.closeModal;
    const cancelBtn = qs('#modalCancelBtn');
    if(cancelBtn) cancelBtn.onclick = window.closeModal;

    const modal = qs('#globalModal');
    if(modal) modal.addEventListener('click', (e) => {
      if(e.target === modal) window.closeModal();
    });

    qsa('.nav button').forEach(b => {
      b.onclick = () => navigate(b.dataset.page);
    });

    setInterval(() => {
      const clockEl = qs('#clock');
      if(clockEl) clockEl.textContent = fmtTime(Date.now());
    }, 1000);

    // ✅ FIX: Periodically re-validate session with server to catch role revocations
    // Runs every 5 minutes while user is active — forces logout/permission downgrade if role removed
    setInterval(async () => {
      if(!accessToken) return;
      console.log('[Auth] Periodic session re-validation...');
      const prevIsAdmin = isAdmin;
      const prevIsOwner = isOwner;
      const valid = await validateSessionWithServer();
      if(!valid){
        console.warn('[Auth] Periodic check: session invalid — logging out');
        clearSession(); location.reload(); return;
      }
      // If permissions changed — update UI immediately without full reload
      if(prevIsAdmin !== isAdmin || prevIsOwner !== isOwner){
        console.warn(`[Auth] Periodic check: permissions changed! isAdmin: ${prevIsAdmin}→${isAdmin}`);
        bootApp();
        navigate('dashboard');
        toast('Your permissions were updated by an administrator','#f3c75a');
      }
    }, 5 * 60 * 1000);

    // ✅ Step 1: تحقق من OAuth callback أو session محفوظة
    const oauthSuccess = await handleOAuth();
    console.log('[Init] OAuth callback result:', oauthSuccess);

    const sessionLoaded = oauthSuccess || loadSession();
    console.log('[Init] Session loaded:', sessionLoaded, '| user:', currentUser?.id || 'none');

    if(sessionLoaded){
      console.log('[Init] Validating session with server...');
      const serverOk = await validateSessionWithServer();
      console.log('[Init] Server validation result:', serverOk);

      if(!serverOk){
        console.warn('[Init] Server rejected session — showing login page');
        qs('#loginContainer').style.display = 'grid';
        qs('#appContainer').style.display   = 'none';
        if(!qs('#loginMessage').textContent) {
          qs('#loginMessage').textContent = 'Session expired or access revoked. Please login again.';
        }
        return;
      }

      console.log('[Init] ✅ Session valid — booting dashboard');
      bootApp();
      await loadAllData();
      navigate('dashboard');
      console.log('[Init] ✅ Redirecting to dashboard complete');
    } else {
      console.log('[Init] No session — showing login page');
    }
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
