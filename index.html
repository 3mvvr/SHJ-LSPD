<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHJ LSPD | Complete Police Command System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:#070b13; color:#edf3ff; min-height:100vh; }
    body::before { content:''; position:fixed; inset:0;
      background: radial-gradient(circle at 20% 30%,rgba(47,124,255,.12),transparent 55%),
                  radial-gradient(circle at 85% 70%,rgba(243,199,90,.08),transparent 50%);
      pointer-events:none; z-index:-1; }

    .app { display:grid; grid-template-columns:280px 1fr; min-height:100vh; }
    .sidebar { background:rgba(10,15,25,.92); backdrop-filter:blur(16px);
      border-right:1px solid rgba(255,255,255,.08); padding:24px 16px;
      position:sticky; top:0; height:100vh; overflow-y:auto; z-index:10; }

    .brand { display:flex; align-items:center; gap:12px; margin-bottom:32px;
      padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,.1); }
    .brand-icon { width:48px; height:48px; background:#0b1730; border:2px solid #f3c75a;
      border-radius:50%; display:grid; place-items:center; font-size:26px; }
    .brand h1 { font-size:18px; font-weight:800; }
    .brand p  { font-size:11px; color:#8fa0bd; }

    .nav-title { font-size:11px; font-weight:800; text-transform:uppercase;
      letter-spacing:1px; color:#53617a; margin:24px 0 12px 8px; }
    .nav button { width:100%; text-align:left; background:transparent; border:none;
      color:#8fa0bd; padding:12px 16px; border-radius:14px; font-weight:600;
      display:flex; align-items:center; gap:12px; cursor:pointer; transition:.2s; margin-bottom:6px; }
    .nav button i { font-size:20px; }
    .nav button.active,.nav button:hover { background:rgba(47,124,255,.12); color:white; }

    .main { min-width:0; }
    .top-bar { height:70px; background:rgba(7,11,19,.7); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center;
      justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:10; }
    .user-info { display:flex; align-items:center; gap:16px; }
    .avatar { width:42px; height:42px; background:linear-gradient(135deg,#2f7cff,#9c4dff);
      border-radius:50%; display:grid; place-items:center; font-weight:bold; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .role-badge { background:rgba(243,199,90,.15); border:1px solid rgba(243,199,90,.3);
      border-radius:40px; padding:4px 12px; font-size:12px; font-weight:600; color:#f3c75a; }

    .content { padding:28px 32px; max-width:1600px; }
    .page { display:none; animation:fadeIn .25s ease; }
    .page.active { display:block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .card { background:rgba(16,24,39,.8); backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,.08); border-radius:24px; overflow:hidden; margin-bottom:28px; }
    .card-header { padding:18px 24px; border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    .card-header h3 { font-size:18px; font-weight:700; }
    .card-body { padding:24px; }

    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:32px; }
    .stat-card { background:rgba(16,24,39,.6); border:1px solid rgba(255,255,255,.08);
      border-radius:20px; padding:20px; text-align:center; transition:.2s; }
    .stat-card i { font-size:32px; color:#2f7cff; margin-bottom:12px; }
    .stat-card .value { font-size:32px; font-weight:800; }
    .stat-card .label { color:#8fa0bd; font-size:13px; margin-top:4px; }

    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:14px 8px; border-bottom:1px solid rgba(255,255,255,.06); }
    th { color:#8fa0bd; font-weight:600; font-size:12px; text-transform:uppercase; }

    .officer-row { display:flex; justify-content:space-between; align-items:center;
      padding:14px 0; border-bottom:1px solid rgba(255,255,255,.08); }
    .officer-row:last-child { border-bottom:none; }
    .divider { height:1px; background:rgba(255,255,255,.06); margin:12px 0; }

    .btn { border:none; border-radius:12px; padding:8px 16px; font-weight:600; cursor:pointer;
      display:inline-flex; align-items:center; gap:8px; transition:.2s;
      background:rgba(255,255,255,.05); color:white; }
    .btn-primary { background:linear-gradient(135deg,#2f7cff,#7258ff); }
    .btn-danger  { background:rgba(255,90,103,.2); color:#ff5a67; border:1px solid rgba(255,90,103,.3); }
    .btn-warning { background:rgba(243,199,90,.15); color:#f3c75a; border:1px solid rgba(243,199,90,.3); }
    .btn-success { background:rgba(46,204,113,.15); color:#2ecc71; border:1px solid rgba(46,204,113,.3); }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }

    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:6px; font-size:13px; font-weight:600; color:#8fa0bd; }
    input,select,textarea { width:100%; background:#0b1220; border:1px solid rgba(255,255,255,.12);
      border-radius:14px; padding:12px 14px; color:white; font-family:inherit; }
    textarea { resize:vertical; min-height:80px; }

    .modal { position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(8px);
      display:none; place-items:center; z-index:1000; }
    .modal.open { display:grid; }
    .modal-content { background:#101827; border:1px solid rgba(255,255,255,.1);
      border-radius:28px; width:min(650px,90%); max-height:85vh; overflow-y:auto; }
    .modal-header,.modal-footer { padding:18px 24px; border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; justify-content:space-between; align-items:center; }
    .modal-footer { border-bottom:none; border-top:1px solid rgba(255,255,255,.08); justify-content:flex-end; gap:12px; }
    .modal-body { padding:24px; }

    /* ── Toast System ── */
    #toastContainer { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
    .toast-item {
      background:#1b2942; border-left:4px solid #2f7cff;
      padding:14px 20px; border-radius:14px; min-width:260px; max-width:360px;
      box-shadow:0 8px 32px rgba(0,0,0,.5); pointer-events:all;
      display:flex; align-items:center; gap:12px; font-size:14px; font-weight:600;
      transform:translateX(120%); opacity:0;
      transition:transform .35s cubic-bezier(.22,.61,.36,1), opacity .35s ease;
    }
    .toast-item.show { transform:translateX(0); opacity:1; }
    .toast-item.hide { transform:translateX(120%); opacity:0; }
    .toast-item i { font-size:20px; flex-shrink:0; }
    /* legacy single toast — keep for compatibility but hidden */
    .toast { display:none !important; }

    .login-container { min-height:100vh; display:grid; place-items:center; padding:24px; }
    .login-card { max-width:460px; background:linear-gradient(145deg,#101827,#070b13);
      border:1px solid rgba(255,255,255,.1); border-radius:32px; padding:40px 32px;
      text-align:center; box-shadow:0 24px 48px rgba(0,0,0,.4); }

    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,.2);
      border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-active  { background:rgba(46,204,113,.15); color:#2ecc71; }
    .badge-inactive{ background:rgba(255,90,103,.15); color:#ff5a67; }
    .badge-info    { background:rgba(52,152,219,.15); color:#3498db; }
    .badge-warning { background:rgba(243,199,90,.15); color:#f3c75a; }
    .badge-danger  { background:rgba(255,90,103,.15); color:#ff5a67; }

    .points-bar { height:6px; background:#1b2942; border-radius:99px; overflow:hidden; margin-top:4px; }
    .points-bar-fill { height:100%; background:linear-gradient(90deg,#2f7cff,#7258ff); border-radius:99px; }

    .mobile-menu { display:none; }

    /* ── Protected Role System ── */
    .role-protected-lock { display:inline-flex; align-items:center; gap:5px; background:rgba(243,199,90,.12); border:1px solid rgba(243,199,90,.3); border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; color:#f3c75a; }
    [data-protected="true"] { border-color:rgba(243,199,90,.25) !important; background:rgba(243,199,90,.04) !important; }

    /* ── Language Selector ── */
    #langSelectorBtn { position:fixed; top:16px; right:16px; z-index:9998; background:rgba(10,15,25,.92); border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:8px 14px; display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; font-weight:600; color:#edf3ff; backdrop-filter:blur(12px); transition:.2s; }
    #langSelectorBtn:hover { background:rgba(47,124,255,.15); border-color:rgba(47,124,255,.3); }
    #langDropdown { position:fixed; top:54px; right:16px; z-index:9997; background:#101827; border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:8px; min-width:200px; max-height:320px; overflow-y:auto; display:none; box-shadow:0 12px 40px rgba(0,0,0,.5); backdrop-filter:blur(12px); }
    #langDropdown.open { display:block; }
    #langDropdown input { margin-bottom:8px; }
    .lang-option { padding:9px 12px; border-radius:10px; cursor:pointer; font-size:13px; font-weight:500; transition:.15s; display:flex; align-items:center; gap:10px; }
    .lang-option:hover { background:rgba(47,124,255,.12); }
    .lang-option.active { background:rgba(47,124,255,.18); color:#2f7cff; font-weight:700; }
    .page-bg-logo {
      position:relative; overflow:hidden;
    }
    .page-bg-logo::before {
      content:'🛡️';
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) rotate(-15deg);
      font-size:340px; opacity:.025; pointer-events:none; z-index:0;
      user-select:none; filter:blur(2px);
    }
    .page-bg-logo > * { position:relative; z-index:1; }

    /* Role color swatch */
    .role-color-dot { width:14px; height:14px; border-radius:50%; display:inline-block; flex-shrink:0; border:1px solid rgba(255,255,255,.15); }

    /* Hierarchy badge */
    .hier-badge { display:inline-flex; align-items:center; gap:4px; background:rgba(47,124,255,.12); border:1px solid rgba(47,124,255,.2); border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; color:#2f7cff; }

    /* ── Drag & Drop (SortableJS) ── */
    .drag-handle { cursor:grab; color:#53617a; padding:0 8px; font-size:18px; user-select:none; transition:.15s; touch-action:none; }
    .drag-handle:hover { color:#8fa0bd; }
    .drag-handle:active { cursor:grabbing; }
    /* SortableJS ghost & chosen states */
    .sortable-ghost { opacity:0 !important; }
    .sortable-chosen {
      opacity:.85;
      background:rgba(47,124,255,.10) !important;
      box-shadow:0 8px 32px rgba(47,124,255,.25), 0 0 0 2px rgba(47,124,255,.5) !important;
      transform:scale(1.01) !important;
      z-index:999;
      border-radius:10px;
      transition:box-shadow .15s, transform .15s !important;
    }
    .sortable-drag {
      opacity:1 !important;
      filter: drop-shadow(0 12px 24px rgba(47,124,255,.35));
    }
    /* Keep old class for any stragglers */
    .dragging { opacity:.4; }
    .drag-over { outline:2px solid #2f7cff !important; outline-offset:-2px; border-radius:10px; }

    @media(max-width:800px){
      .app { grid-template-columns:1fr; }
      .sidebar { position:fixed; right:-280px; transition:.2s; height:100vh; z-index:20; }
      .sidebar.open { right:0; }
      .mobile-menu { display:inline-flex; }
      .stats-grid { grid-template-columns:1fr 1fr; }
      .content { padding:20px; }
    }

    /* ── Custom Scrollbar ── */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:rgba(7,11,19,.5); border-radius:99px; }
    ::-webkit-scrollbar-thumb { background:rgba(47,124,255,.35); border-radius:99px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(47,124,255,.6); }
    * { scrollbar-width:thin; scrollbar-color:rgba(47,124,255,.35) rgba(7,11,19,.5); }

    /* ── RTL Full Support ── */
    [dir="rtl"] .sidebar { border-right:none; border-left:1px solid rgba(255,255,255,.08); }
    [dir="rtl"] .nav button { text-align:right; }
    [dir="rtl"] .brand { flex-direction:row-reverse; }
    [dir="rtl"] .top-bar { flex-direction:row-reverse; }
    [dir="rtl"] .user-info { flex-direction:row-reverse; }
    [dir="rtl"] .card-header { flex-direction:row-reverse; }
    [dir="rtl"] .btn { flex-direction:row-reverse; }
    [dir="rtl"] #langSelectorBtn { right:auto; left:16px; }
    [dir="rtl"] #langDropdown { right:auto; left:16px; }
    [dir="rtl"] #toastContainer { right:auto; left:24px; }
    [dir="rtl"] .toast-item { transform:translateX(-120%); border-left:none; border-right:4px solid #2f7cff; }
    [dir="rtl"] .toast-item.show { transform:translateX(0); }
    [dir="rtl"] .toast-item.hide { transform:translateX(-120%); }
    [dir="rtl"] th, [dir="rtl"] td { text-align:right; }
    [dir="rtl"] .modal-footer { flex-direction:row-reverse; }
    [dir="rtl"] .drag-handle { order:-1; }
    [dir="rtl"] .points-bar-fill { margin-left:auto; }
    [dir="rtl"] @media(max-width:800px){
      [dir="rtl"] .sidebar { position:fixed; right:auto; left:-280px; }
      [dir="rtl"] .sidebar.open { left:0; }
    }

    /* ── Performance: GPU accelerated transitions ── */
    .page, .modal, .toast-item, .sidebar, .nav button {
      will-change: transform;
      backface-visibility: hidden;
    }

    /* ── Console Terminal ── */
    #consoleInput:focus { border-bottom-color:#2f7cff !important; outline:none; box-shadow:0 2px 0 #2f7cff; }
    #consoleOutput::-webkit-scrollbar { width:4px; }
    #consoleOutput { scrollbar-width:thin; scrollbar-color:rgba(47,124,255,.3) transparent; }

    /* ── PATCH 10: Tactical Page Header ── */
    .tactical-page-header {
      display:flex; align-items:center; gap:18px;
      padding:20px 28px;
      background:linear-gradient(135deg, rgba(16,24,39,.95) 0%, rgba(10,15,28,.98) 100%);
      border:1px solid rgba(47,124,255,.18);
      border-radius:20px;
      margin-bottom:24px;
      position:relative;
      overflow:hidden;
    }
    .tactical-page-header::before {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(135deg, rgba(47,124,255,.06) 0%, transparent 60%);
      pointer-events:none;
    }
    .tactical-page-header::after {
      content:'';
      position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(47,124,255,.5), rgba(243,199,90,.3), transparent);
    }
    .tactical-header-icon {
      width:54px; height:54px; flex-shrink:0;
      background:linear-gradient(135deg, rgba(47,124,255,.18), rgba(114,88,255,.12));
      border:1px solid rgba(47,124,255,.3);
      border-radius:16px;
      display:grid; place-items:center;
      box-shadow:0 0 20px rgba(47,124,255,.15), inset 0 1px 0 rgba(255,255,255,.08);
      position:relative; z-index:1;
    }
    .tactical-header-icon i { font-size:26px; color:#2f7cff; }
    .tactical-header-text { flex:1; position:relative; z-index:1; }
    .tactical-header-text h2 {
      font-size:22px; font-weight:800; letter-spacing:-.3px;
      background:linear-gradient(135deg, #edf3ff 30%, #8fa0bd);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .tactical-header-text .subtitle {
      font-size:12px; color:#53617a; margin-top:4px; font-weight:500; letter-spacing:.5px; text-transform:uppercase;
    }
    .tactical-header-actions { display:flex; gap:10px; flex-shrink:0; position:relative; z-index:1; }
    .tactical-glow-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(243,199,90,.1); border:1px solid rgba(243,199,90,.25);
      border-radius:30px; padding:5px 14px; font-size:12px; font-weight:700; color:#f3c75a;
      box-shadow:0 0 12px rgba(243,199,90,.1);
    }
  </style>
</head>
<body>

<div id="langSelectorBtn" onclick="toggleLangDropdown()">
  <i class="ti ti-world"></i> <span id="currentLangLabel">English</span> <i class="ti ti-chevron-down" style="font-size:11px;opacity:.6"></i>
</div>
<div id="langDropdown">
  <input id="langSearch" placeholder="🔍 Search language..." autocomplete="off" oninput="filterLangs(this.value)" style="margin-bottom:6px">
  <div id="langList"></div>
</div>

<div id="toastContainer"></div>
<div id="toastMessage" class="toast"></div>

<div id="loginContainer" class="login-container">
  <div class="login-card">
    <div style="width:80px;height:80px;background:#0b1730;border:2px solid #f3c75a;border-radius:50%;display:grid;place-items:center;font-size:40px;margin:0 auto 20px">🛡️</div>
    <h1 style="font-size:28px;font-weight:900" data-i18n="login_title">SHJ LSPD</h1>
    <p style="color:#8fa0bd;margin:8px 0 24px" data-i18n="login_sub">Complete Police Management System</p>
    <button id="discordLoginBtn" class="btn btn-primary" style="width:100%;justify-content:center">
      <i class="ti ti-brand-discord"></i> <span data-i18n="login_btn">Login with Discord</span>
    </button>
    <p id="loginMessage" style="margin-top:16px;font-size:13px;color:#8fa0bd"></p>
  </div>
</div>

<div id="appContainer" class="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div><h1>SHJ LSPD</h1><p>Command Center</p></div>
    </div>
    <nav class="nav">
      <div class="nav-title" data-i18n="main">Main</div>
      <button class="active" data-page="dashboard"><i class="ti ti-dashboard"></i> <span data-i18n="dashboard">Dashboard</span></button>
      <button data-page="officers"><i class="ti ti-users"></i> <span data-i18n="officers">Officers</span></button>
      <button data-page="ranks"><i class="ti ti-stairs-up"></i> <span data-i18n="ranks">Ranks</span></button>
      <button data-page="points"><i class="ti ti-chart-bar"></i> <span data-i18n="points_logs">Points Logs</span></button>
      <button data-page="laws"><i class="ti ti-book"></i> <span data-i18n="laws">Laws & Rules</span></button>
      <button data-page="uniform"><i class="ti ti-shirt"></i> <span data-i18n="uniform">Uniform Guide</span></button>
      <button data-page="codes"><i class="ti ti-radio"></i> <span data-i18n="codes">Police Codes</span></button>
      <button data-page="wanted"><i class="ti ti-car"></i> <span data-i18n="wanted">Wanted & Impound</span></button>
      <button data-page="cases"><i class="ti ti-folder"></i> <span data-i18n="cases">Cases</span></button>
      <button data-page="reports"><i class="ti ti-file-text"></i> <span data-i18n="reports">Reports</span></button>
      <div class="nav-title" data-i18n="administration">Administration</div>
      <button data-page="discordUsers" data-admin-only style="display:none"><i class="ti ti-brand-discord"></i> <span data-i18n="discord_users">Discord Users</span></button>
      <button data-page="serverRoles" data-admin-only style="display:none"><i class="ti ti-shield-star"></i> <span data-i18n="server_roles">Server Roles</span></button>
      <button data-page="websiteRoles" data-owner-only style="display:none"><i class="ti ti-lock-access"></i> <span data-i18n="website_roles">Website Roles</span></button>
      <button data-page="logs" data-admin-only style="display:none"><i class="ti ti-history"></i> <span data-i18n="system_logs">System Logs</span></button>
      <button data-page="settings" data-admin-only style="display:none"><i class="ti ti-settings"></i> <span data-i18n="settings">Settings</span></button>
      <button data-page="adminRoles" data-owner-only style="display:none"><i class="ti ti-shield-lock"></i> <span data-i18n="admin_roles">Admin Roles</span></button>
      <button data-page="discordControl" data-admin-only style="display:none"><i class="ti ti-command"></i> <span data-i18n="discord_control">Discord Control Center</span></button>
      <button data-page="console" data-admin-only style="display:none"><i class="ti ti-terminal-2"></i> <span data-i18n="console">Console</span></button>
    </nav>
  </aside>

  <main class="main">
    <div class="top-bar">
      <button class="btn mobile-menu" id="mobileMenuBtn"><i class="ti ti-menu-2"></i></button>
      <div><b>Control Panel</b><div id="clock" style="font-size:12px;color:#8fa0bd"></div></div>
      <div class="user-info">
        <div class="avatar" id="userAvatar">U</div>
        <div><b id="userName">User</b><div id="userRole" class="role-badge">Officer</div></div>
        <button id="logoutBtn" class="btn" style="background:rgba(255,90,103,.15);color:#ff5a67">
          <i class="ti ti-logout"></i> <span data-i18n="logout">Logout</span>
        </button>
      </div>
    </div>
    <div class="content">
      <div id="dashboard"    class="page active"></div>
      <div id="officers"     class="page"></div>
      <div id="ranks"        class="page"></div>
      <div id="points"       class="page"></div>
      <div id="laws"         class="page"></div>
      <div id="uniform"      class="page"></div>
      <div id="codes"        class="page"></div>
      <div id="wanted"       class="page"></div>
      <div id="cases"        class="page"></div>
      <div id="reports"      class="page"></div>
      <div id="discordUsers" class="page"></div>
      <div id="serverRoles"  class="page"></div>
      <div id="websiteRoles" class="page"></div>
      <div id="logs"         class="page"></div>
      <div id="settings"     class="page"></div>
      <div id="adminRoles" class="page"></div>
      <div id="discordControl" class="page"></div>
      <div id="console"    class="page"></div>
    </div>
  </main>
</div>

<div id="globalModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="btn btn-sm" id="closeModalBtn">✕</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" id="modalCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>
<!-- toast notifications handled by #toastContainer injected above -->

<script>
(function(){
  // ═══════════════════════════ CONFIG ═══════════════════════════
  const CFG = {
    WORKER_URL:        'https://lspd.oabbmb.workers.dev',
    DISCORD_CLIENT_ID: '1505897669334138940',
    GUILD_ID:          '1154498662286770179',
  };

  // ═══════════════════════════ STATE ════════════════════════════
  let currentUser = null;
  let isAdmin     = false;
  let isOwner     = false;
  let isFullAccess = false;
  let userPermissions = [];
  let accessToken = null;
  let store = {
    officers:[], ranks:[], pointsLog:[], laws:[], uniforms:[],
    codes:[], wanted:[], impound:[], cases:[], reports:[],
    users:[], activity:[], settings:{ webhookUrl:'', logsEnabled:true },
    adminRoles:[], webhooks:{}, permissions:[], nicknames:{}
  };

  // ── Nickname helpers ──
  function getNick(userId, fallback){ return (store.nicknames && store.nicknames[userId]) || fallback || userId || '-'; }
  function getCurrentUserDisplay(){ return getNick(currentUser?.id, currentUser?.username); }

  // ═══════════════════════════ UTILS ════════════════════════════
  const qs  = (s,p=document) => p.querySelector(s);
  const qsa = (s,p=document) => [...p.querySelectorAll(s)];
  function esc(str){ return String(str??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }
  // ═══════════════════════════ TOAST SYSTEM ════════════════════════════
  let _toastCounter = 0;
  function toast(msg, color='#2f7cff'){
    const container = document.getElementById('toastContainer');
    if(!container) return;
    const id = 'toast-' + (++_toastCounter);
    const icon = color === '#2ecc71' ? 'ti-circle-check' : color === '#ff5a67' ? 'ti-circle-x' : color === '#f3c75a' ? 'ti-alert-triangle' : 'ti-info-circle';
    const el = document.createElement('div');
    el.className = 'toast-item';
    el.id = id;
    el.style.borderLeftColor = color;
    el.innerHTML = `<i class="ti ${icon}" style="color:${color}"></i><span>${msg}</span>`;
    container.appendChild(el);
    requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('show'); }); });
    setTimeout(() => {
      el.classList.add('hide');
      setTimeout(() => el.remove(), 400);
    }, 3200);
  }
  function fmtTime(ts){ return ts ? new Date(ts).toLocaleString('en-US') : '-'; }

  // ═══════════════════════════ API ENGINE ══════════════════════════
  async function api(method, path, body=null){
    const opts = { method, headers: { 'Content-Type':'application/json' } };
    if(accessToken) opts.headers['Authorization'] = 'Bearer '+accessToken;
    if(body) opts.body = JSON.stringify(body);
    try {
      const res = await fetch(CFG.WORKER_URL + path, opts);
      let data;
      try { data = await res.json(); } catch(e) { return { ok:false, reason:'invalid_json_response' }; }
      if(!data.ok && data.reason) console.warn('API warn:', data.reason);
      // ✅ FIX: If server returns 403 missing_role — role was revoked, clear session immediately
      if(res.status === 403 && (data.error === 'missing_role' || data.reason === 'forbidden_admin_only')){
        console.warn('[API] 403 received — re-validating session to detect role changes');
        const valid = await validateSessionWithServer();
        if(!valid){ clearSession(); location.reload(); return data; }
        // If still valid but not admin, update UI
        bootApp();
      }
      return data;
    } catch(e){ console.error('API error:', e); return { ok:false, reason: e.message }; }
  }

  async function loadAllData(){
    // ✅ PERFORMANCE: Parallel requests instead of sequential
    const [data, nickRes, logoRes] = await Promise.all([
      api('GET', '/api/data'),
      api('GET', '/api/nicknames'),
      api('GET', '/api/logo'),
    ]);
    if(data.ok){
      ['officers','ranks','pointsLog','laws','uniforms','codes',
       'wanted','impound','cases','reports','users','activity','settings'
      ].forEach(k => { if(data[k] !== undefined) store[k] = data[k]; });
    }
    if(nickRes.ok) store.nicknames = nickRes.data || {};
    if(logoRes.ok && logoRes.data) applyLogo(logoRes.data);
    // Load admin-only data in parallel
    if(isOwner || isFullAccess){
      const [arRes, whRes] = await Promise.all([
        api('GET','/api/admin-roles'),
        api('GET','/api/webhooks'),
      ]);
      if(arRes.ok) store.adminRoles = arRes.data;
      if(whRes.ok) store.webhooks = whRes.data;
    } else if(isAdmin){
      const whRes = await api('GET','/api/webhooks');
      if(whRes.ok) store.webhooks = whRes.data;
    }
  }

  // ═══════════════════════════ SESSION ══════════════════════════
  function saveSession(user,admin,token,owner=false,fullAccess=false,permissions=[]){
    localStorage.setItem('lspd_session', JSON.stringify({ user, isAdmin:admin, isOwner:owner, isFullAccess:fullAccess, permissions, token, ts:Date.now() }));
    currentUser=user; isAdmin=admin; isOwner=owner; isFullAccess=fullAccess; userPermissions=permissions; accessToken=token;
  }
  function loadSession(){
    try {
      const s = JSON.parse(localStorage.getItem('lspd_session')||'null');
      if(!s) return false;
      if(Date.now()-s.ts > 12*3600*1000){ localStorage.removeItem('lspd_session'); return false; }
      currentUser=s.user; isAdmin=s.isAdmin; isOwner=s.isOwner||false; isFullAccess=s.isFullAccess||false; userPermissions=s.permissions||[]; accessToken=s.token;
      return true;
    } catch{ return false; }
  }
  function clearSession(){ localStorage.removeItem('lspd_session'); currentUser=null; isAdmin=false; isOwner=false; isFullAccess=false; userPermissions=[]; accessToken=null; }

  async function validateSessionWithServer(){
    if(!accessToken){
      console.warn('[Auth] validateSessionWithServer: no accessToken — skipping');
      return false;
    }
    console.log('[Auth] Validating session with server — user:', currentUser?.id);
    try {
      const r = await api('GET', '/api/me');
      if(!r.ok){
        console.warn('[Auth] /api/me returned not ok:', r.error || r.reason);
        if(r.error === 'unauthorized' || r.reason === 'unauthorized' ||
           r.error === 'missing_role' || r.error === 'not_in_guild') {
          console.warn('[Auth] Access revoked — clearing session immediately');
          clearSession();
        }
        return false;
      }
      // ✅ FIX: ALWAYS override local isAdmin/isOwner with live server values — never trust localStorage cache
      const serverIsAdmin = r.isAdmin === true;
      const serverIsOwner = r.isOwner === true;
      const serverIsFullAccess = r.isFullAccess === true;
      const serverPermissions = r.permissions || [];
      if(isAdmin !== serverIsAdmin || isOwner !== serverIsOwner){
        console.warn(`[Auth] Role change detected! Local: isAdmin=${isAdmin} isOwner=${isOwner} → Server: isAdmin=${serverIsAdmin} isOwner=${serverIsOwner}`);
        console.warn('[Auth] Applying server role state immediately');
      }
      isAdmin = serverIsAdmin;
      isOwner = serverIsOwner;
      isFullAccess = serverIsFullAccess;
      userPermissions = serverPermissions;
      if(currentUser) currentUser = { ...currentUser, ...(r.user || {}) };
      // ✅ FIX: Save updated session with LIVE server values — overwrite any stale data
      saveSession(currentUser, isAdmin, accessToken, isOwner, isFullAccess, userPermissions);
      console.log('[Auth] Server validation OK — isAdmin:', isAdmin, '| isOwner:', isOwner);
      return true;
    } catch(e){
      console.error('[Auth] Session validation network error (keeping session):', e.message);
      // Network failure — keep existing session to avoid false logout
      return true;
    }
  }

  // ═══════════════════════════ DISCORD OAUTH ════════════════════
  function loginDiscord() {
    const redirectUri = 'https://lspd.oabbmb.workers.dev/api/auth/callback';
    const clientId = '1505897669334138940';
    const scope = 'identify guilds guilds.members.read';

    const params = new URLSearchParams({
      client_id: clientId,
      redirect_uri: redirectUri,
      response_type: 'code',
      scope: scope,
    });

    location.href = 'https://discord.com/oauth2/authorize?' + params.toString();
  }

  async function handleOAuth() {
    const params = new URLSearchParams(location.search);
    const token      = params.get('access_token');
    const userParam  = params.get('user');
    const isAdminParam = params.get('isAdmin');
    const isOwnerParam = params.get('isOwner');
    const authError  = params.get('auth_error');
    const errorDesc  = params.get('error_desc');

    // ✅ إذا رجع auth_error من الـ Worker — أظهره مباشرة
    if (authError) {
      console.warn('[Auth] OAuth returned error:', authError, '—', errorDesc);
      history.replaceState({}, '', location.pathname);
      const msgEl = qs('#loginMessage');
      if (msgEl) {
        const msgs = {
          not_in_guild:        'You are not in the required Discord server.',
          missing_role:        'You do not have the required role in the server.',
          server_misconfigured: 'Server configuration error. Contact admin.',
          invalid_bot_token:   'Bot token error. Contact admin.',
          bot_permission_denied: 'Bot permission error. Contact admin.',
          unauthorized:        'Access denied. Missing required role.',
        };
        msgEl.textContent = msgs[authError] || ('Access denied: ' + (errorDesc || authError));
        msgEl.style.color = '#ff5a67';
      }
      return false;
    }

    if (!token || !userParam) return false;

    // ✅ حفظ الـ session أولاً قبل أي شيء آخر
    let user;
    try {
      user = JSON.parse(decodeURIComponent(userParam));
    } catch (e) {
      console.error('[Auth] Failed to parse user data from OAuth redirect:', e);
      return false;
    }

    const admin = isAdminParam === 'true';
    const owner = isOwnerParam === 'true';
    console.log('[Auth] OAuth success — User authenticated:', user.id, '|', user.username);
    console.log('[Auth] isAdmin:', admin, '| isOwner:', owner, '| token length:', token.length);

    // ✅ حفظ الـ session في localStorage قبل history.replaceState
    saveSession(user, admin, token, owner, false, []);
    console.log('[Auth] Session created and saved to localStorage');

    // ✅ مسح الـ URL params بعد الحفظ
    history.replaceState({}, '', location.pathname);
    console.log('[Auth] URL cleaned up');

    return true;
  }

  function bootApp(){
    qs('#loginContainer').style.display = 'none';
    qs('#appContainer').style.display   = 'grid';
    document.body.classList.toggle('is-admin', isAdmin);
    document.body.classList.toggle('is-owner', isOwner);
    document.body.classList.toggle('is-full-access', isFullAccess);
    const av = qs('#userAvatar');
    if(currentUser?.avatar) av.innerHTML = `<img src="${currentUser.avatar}" alt="avatar">`;
    else av.textContent = (currentUser?.username?.[0]||'U').toUpperCase();
    qs('#userName').textContent = getCurrentUserDisplay();
    qs('#userRole').textContent = isOwner ? '👑 Ownership' : (isFullAccess ? '🔑 Full Access' : (isAdmin ? '⚡ Admin' : '👮 Officer'));
    // إظهار/إخفاء أزرار الـ nav حسب الصلاحيات
    const ownerOnlyBtns = document.querySelectorAll('[data-owner-only]');
    ownerOnlyBtns.forEach(b => b.style.display = (isOwner || isFullAccess) ? '' : 'none');
    const adminOnlyBtns = document.querySelectorAll('[data-admin-only]');
    adminOnlyBtns.forEach(b => b.style.display = (isAdmin || isOwner || isFullAccess) ? '' : 'none');
    if(currentUser?.id) {
      api('POST','/api/users/register',{
        id: currentUser.id,
        username: currentUser.username,
        avatar: currentUser.avatar,
        isAdmin,
        isOwner,
        lastLogin: Date.now()
      }).catch(()=>{});
    }
  }

  function applyLogo(logoUrl){
    if(!logoUrl) return;
    // Login page logo
    const loginIcon = qs('#loginContainer .login-card > div:first-child');
    if(loginIcon){ loginIcon.innerHTML = `<img src="${esc(logoUrl)}" style="width:100%;height:100%;object-fit:contain;border-radius:50%">`; }
    // Navbar brand icon
    const brandIcon = qs('.brand-icon');
    if(brandIcon){ brandIcon.innerHTML = `<img src="${esc(logoUrl)}" style="width:100%;height:100%;object-fit:contain;border-radius:50%">`; }
    store._logoUrl = logoUrl;
  }

  // ═══════════════════ GLOBAL CONFIRM COOLDOWN ═══════════════════
  // After action fires, silently block re-press for 5s (no countdown text).
  let _confirmCooldown = false;
  let _confirmTimer = null;

  function armConfirmBtn() {
    const btn = qs('#modalConfirmBtn');
    if (!btn) return;
    _confirmCooldown = false;
    btn.disabled = false;
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
    // Remove any spinner we added
    const sp = btn.querySelector('._cd-spinner');
    if (sp) sp.remove();
  }

  function lockConfirmBtn(seconds = 5) {
    const btn = qs('#modalConfirmBtn');
    if (!btn || _confirmCooldown) return;
    _confirmCooldown = true;
    // Do NOT change opacity, color, text, or disabled state
    // Only add a tiny spinner as visual cue
    if (!btn.querySelector('._cd-spinner')) {
      const sp = document.createElement('span');
      sp.className = 'spinner _cd-spinner';
      sp.style.cssText = 'width:14px;height:14px;border-width:2px;margin-left:6px;vertical-align:middle';
      btn.appendChild(sp);
    }
    clearTimeout(_confirmTimer);
    _confirmTimer = setTimeout(() => {
      _confirmCooldown = false;
      if (btn) {
        btn.disabled = false;
        btn.style.opacity = '';
        btn.style.pointerEvents = '';
        const sp = btn.querySelector('._cd-spinner');
        if (sp) sp.remove();
      }
    }, seconds * 1000);
  }

  // Patch confirm button — fire action first, then lock
  function patchConfirmWithCooldown() {
    const btn = qs('#modalConfirmBtn');
    if (!btn || btn._cdPatched) return;
    btn._cdPatched = true;
    btn.addEventListener('click', function(e) {
      if (_confirmCooldown) { e.stopImmediatePropagation(); return; }
      setTimeout(() => lockConfirmBtn(5), 0);
    }, true);
  }

  function openModal(){
    // ✅ FIX 7: Reset confirm button to clean state before opening
    const btn = qs('#modalConfirmBtn');
    if (btn) {
      btn.className = 'btn btn-primary';
      btn.textContent = 'Confirm';
      btn.onclick = null;
      btn._cdPatched = false;
      btn.disabled = false;
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
      btn.style.display = '';
    }
    const cancelBtn = qs('#modalCancelBtn');
    if (cancelBtn) cancelBtn.textContent = 'Cancel';
    qs('#globalModal').classList.add('open');
    armConfirmBtn();
    setTimeout(patchConfirmWithCooldown, 0);
  }
  window.closeModal = () => {
    qs('#globalModal').classList.remove('open');
    clearTimeout(_confirmTimer);
    _confirmCooldown = false;
    const btn = qs('#modalConfirmBtn');
    if (btn) {
      btn.disabled = false;
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
      btn._cdPatched = false;
      // ✅ FIX 7: Always reset class + label on close so next modal starts clean
      btn.className = 'btn btn-primary';
      btn.textContent = 'Confirm';
    }
    const cancelBtn = qs('#modalCancelBtn');
    if (cancelBtn) cancelBtn.textContent = 'Cancel';
  };

  // ═══════════════════════════ PAGES ROUTING ═══════════════════════════
  const PAGE_RENDERERS = {
    dashboard:    renderDashboard,
    officers:     renderOfficers,
    ranks:        renderRanks,
    points:       renderPoints,
    laws:         renderLaws,
    uniform:      renderUniforms,
    codes:        renderCodes,
    wanted:       renderWanted,
    cases:        renderCases,
    reports:      renderReports,
    discordUsers: renderDiscordUsers,
    serverRoles:  renderServerRoles,
    websiteRoles: renderWebsiteRoles,
    logs:         renderLogs,
    settings:     renderSettings,
    adminRoles:   renderAdminRoles,
    discordControl: renderDiscordControl,
    console:      renderConsole,
  };

  function navigate(pageId){
    qsa('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.page===pageId));
    qsa('.page').forEach(p=>p.classList.toggle('active', p.id===pageId));
    qs('#sidebar')?.classList.remove('open');
    if(PAGE_RENDERERS[pageId]) PAGE_RENDERERS[pageId]();
    // Apply bg logo effect to ALL main content pages after render
    // ✅ FIX 10: Military background applied globally to every page
    const el = qs(`#${pageId}`);
    if(el && !el.querySelector('.page-bg-logo')){
      const inner = el.innerHTML;
      if(inner.trim()) el.innerHTML = `<div class="page-bg-logo">${inner}</div>`;
    }
  }

  // ═══════════════════════════ RENDERERS ════════════════════════
  function renderDashboard(){
    const o = store.officers || [];
    const active = o.filter(x=>x.status==='active').length;
    qs('#dashboard').innerHTML = `
      <div class="page-bg-logo">
      <div class="stats-grid">
        <div class="stat-card"><i class="ti ti-users"></i><div class="value">${o.length}</div><div class="label">Total Officers</div></div>
        <div class="stat-card"><i class="ti ti-shield-check"></i><div class="value">${active}</div><div class="label">Active</div></div>
        <div class="stat-card"><i class="ti ti-stairs-up"></i><div class="value">${(store.ranks||[]).length}</div><div class="label">Ranks</div></div>
        <div class="stat-card"><i class="ti ti-file-text"></i><div class="value">${(store.reports||[]).length}</div><div class="label">Reports</div></div>
      </div>
      <div class="card"><div class="card-header"><h3><i class="ti ti-users"></i> Officers Overview</h3></div>
      <div class="card-body">
        ${o.length === 0 ? '<p style="color:#8fa0bd;text-align:center">No officers found</p>' :
          o.map(of=>`
          <div class="officer-row">
            <div>
              <b>${esc(of.name)}</b> &nbsp;<span style="color:#8fa0bd;font-size:13px">#${esc(String(of.badge||''))}</span>
              <div style="font-size:12px;color:#8fa0bd;margin-top:2px">${esc(of.rank||'')}</div>
              <div class="points-bar" style="width:160px"><div class="points-bar-fill" style="width:${Math.min(100,((of.points||0)/30)*100)}%"></div></div>
            </div>
            <div style="text-align:right">
              <span class="badge badge-${of.status==='active'?'active':'inactive'}">${esc(of.status||'')}</span>
              <div style="font-size:12px;color:#8fa0bd;margin-top:4px">${of.points||0}/30 pts</div>
            </div>
          </div>
        `).join('<div class="divider"></div>')}
      </div></div>
    `;
  }

  function renderOfficers(){
    const officers = store.officers || [];
    const rows = officers.map(o=>`
      <tr data-id="${o.id}">
        <td style="width:28px"><span class="drag-handle ti ti-grip-vertical" title="Drag to reorder"></span></td>
        <td><b>${esc(o.name)}</b></td>
        <td>#${esc(String(o.badge||''))}</td>
        <td>${esc(o.rank||'')}</td>
        <td>${esc(o.dept||'LSPD')}</td>
        <td>
          <div class="points-bar" style="width:80px;display:inline-block">
            <div class="points-bar-fill" style="width:${Math.min(100,((o.points||0)/30)*100)}%"></div>
          </div>
          <span style="font-size:12px;color:#8fa0bd;margin-left:6px">${o.points||0}/30</span>
        </td>
        <td><span class="badge badge-${o.status==='active'?'active':'inactive'}">${esc(o.status||'')}</span></td>
        <td>
          ${isAdmin ? `<button class="btn btn-sm btn-warning" onclick="editOfficer(${o.id})"><i class="ti ti-edit"></i></button>
          <button class="btn btn-sm btn-danger" onclick="deleteOfficer(${o.id})"><i class="ti ti-trash"></i></button>` : ''}
        </td>
      </td>`).join('');
    qs('#officers').innerHTML = `
      <div class="page-bg-logo">
      <div class="tactical-page-header">
        <div class="tactical-header-icon"><i class="ti ti-users"></i></div>
        <div class="tactical-header-text">
          <h2>${t('officers')||'Officers'} Management</h2>
          <div class="subtitle">Personnel command registry</div>
        </div>
        <div class="tactical-header-actions">
          <span class="tactical-glow-badge"><i class="ti ti-shield" style="font-size:13px"></i> ${officers.length} ${t('officers')||'Officers'}</span>
          ${isAdmin ? `<button class="btn btn-primary" onclick="openOfficerModal()"><i class="ti ti-plus"></i> ${t('add_officer')||'Add Officer'}</button>` : ''}
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <table><thead><tr><th></th><th>${t('name')||'Name'}</th><th>${t('badge')||'Badge'}</th><th>${t('rank')||'Rank'}</th><th>${t('dept')||'Dept'}</th><th>${t('points')||'Points'}</th><th>${t('status')||'Status'}</th><th>${t('actions')||'Actions'}</th></tr></thead>
          <tbody id="officersTbody">${rows || `<tr><td colspan="8" style="color:#8fa0bd;text-align:center">${t('no_officers')||'No officers found'}</td>`}</tbody>
        </table>
        </div>
      </div></div>`;
    if(isAdmin) initDnD('officersTbody', 'officers', renderOfficers);
  }

  window.editOfficer = id => openOfficerModal(id);
  window.deleteOfficer = async id => {
    const o = (store.officers||[]).find(x=>x.id===id);
    if(!o) return;
    qs('#modalTitle').textContent = '⚠️ Delete Officer';
    qs('#modalBody').innerHTML = `<div style="text-align:center;padding:8px 0"><div style="font-size:40px;margin-bottom:12px">🗑️</div><p style="font-size:15px;margin-bottom:8px">Delete officer <b>${esc(o.name)}</b>?</p><p style="color:#ff5a67;font-size:13px">This action cannot be undone.</p></div>`;
    qs('#modalConfirmBtn').className = 'btn btn-danger';
    qs('#modalConfirmBtn').textContent = 'Delete';
    qs('#modalConfirmBtn').onclick = async () => {
      const r = await api('DELETE','/api/officers',{ id });
      if(r.ok){ store.officers = (store.officers||[]).filter(o=>o.id!==id); renderOfficers(); renderDashboard(); closeModal(); toast('Officer deleted','#ff5a67'); }
      else toast('Error: '+(r.reason||'failed'),'#ff5a67');
      qs('#modalConfirmBtn').className = 'btn btn-primary';
      qs('#modalConfirmBtn').textContent = 'Confirm';
    };
    openModal();
  };

  window.openOfficerModal = (id=null) => {
    const o = id ? (store.officers||[]).find(x=>x.id===id) : null;

  // ═══════════════════════ UNIFIED REORDER SYSTEM (SortableJS) ═══════════════════════
  // Proper drag-and-drop using SortableJS — supports mouse + touch, smooth animation,
  // collision detection, ghost element, lift effect, auto-save.

  function initDnD(containerId, collection, onReorder) {
    const tbody = document.getElementById(containerId);
    if (!tbody || !window.Sortable) return;
    // Destroy old instance if re-initializing
    if (tbody._sortable) { tbody._sortable.destroy(); }

    tbody._sortable = Sortable.create(tbody, {
      animation: 150,
      easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)',
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      forceFallback: false,
      scrollSensitivity: 80,
      scrollSpeed: 12,
      onStart(evt) {
        // Lift effect — already handled by chosenClass CSS
      },
      onEnd(evt) {
        // noop — handled by onUpdate
      },
      async onUpdate(evt) {
        const rows = [...tbody.querySelectorAll('[data-id]')];
        const newOrder = rows.map(r => Number(r.dataset.id));
        const res = await api('POST', '/api/reorder', { collection, order: newOrder });
        if (res.ok) {
          if (store[collection]) store[collection] = res.data;
          toast('Order saved ✓', '#2ecc71');
        } else {
          toast('Reorder failed — reverting', '#ff5a67');
          if (onReorder) onReorder();
        }
      },
    });
  }

  // Div-based DnD — same engine (for laws, uniforms, codes list containers)
  function initDnDDiv(containerId, collection, onReorder) {
    initDnD(containerId, collection, onReorder);
  }

    [ranks[idx], ranks[newIdx]] = [ranks[newIdx], ranks[idx]];

  // ─── Evidence Media Preview Helper ───
  function renderEvidenceMedia(evidenceStr) {
    if(!evidenceStr) return '';
    // Split by newlines or commas to support multiple URLs
    const lines = evidenceStr.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
    const out = lines.map(line => {
      // Check if it looks like a URL
      const isUrl = /^https?:\/\//i.test(line);
      if(!isUrl) return `<div style="font-size:13px;padding:4px 0;color:#edf3ff">${esc(line)}</div>`;
      // Detect image URLs
      if(/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?.*)?$/i.test(line) ||
         /imgur\.com|i\.gyazo|prnt\.sc|gyazo|pbs\.twimg|cdn\.discordapp|media\.discordapp/i.test(line)) {
        return `<div style="margin:6px 0">
          <a href="${esc(line)}" target="_blank" rel="noopener" style="display:inline-block;max-width:100%">
            <img src="${esc(line)}" style="max-width:100%;max-height:320px;border-radius:10px;border:1px solid rgba(255,255,255,.1);cursor:zoom-in;object-fit:contain;background:#040810" onerror="this.parentElement.parentElement.innerHTML='<a href=\\'${esc(line).replace(/'/g,'\\\'')}\\'  target=\\'_blank\\' style=\\'color:#2f7cff;font-size:13px;word-break:break-all\\'>${esc(line)}</a>'">
          </a>
        </div>`;
      }
      // Detect video URLs
      if(/\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(line)) {
        return `<div style="margin:6px 0">
          <video controls style="max-width:100%;max-height:320px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:#040810">
            <source src="${esc(line)}">
            <a href="${esc(line)}" target="_blank" style="color:#2f7cff">Open Video</a>
          </video>
        </div>`;
      }
      // YouTube embed
      const ytMatch = line.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
      if(ytMatch) {
        return `<div style="margin:6px 0;position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;max-width:560px">
          <iframe src="https://www.youtube.com/embed/${ytMatch[1]}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:10px" allowfullscreen loading="lazy"></iframe>
        </div>`;
      }
      // Generic URL — show as clickable link
      return `<div style="margin:4px 0">
        <a href="${esc(line)}" target="_blank" rel="noopener" style="color:#2f7cff;font-size:13px;word-break:break-all;display:flex;align-items:center;gap:6px">
          <i class="ti ti-external-link" style="font-size:14px;flex-shrink:0"></i> ${esc(line)}
        </a>
      </div>`;
    }).join('');
    return out || esc(evidenceStr);
  }

  // Apply saved branding on load — reads localStorage instantly, then syncs KV
  function applyStoredBranding(){
    try {
      const b = JSON.parse(localStorage.getItem('lspd_branding') || 'null');
      if(b){ _applyBrandingObj(b); }
    } catch(e){}
    // Async: also pull from KV (for shared branding across sessions/devices)
    api('GET', '/api/branding').then(res => {
      if(res.ok && res.data && Object.keys(res.data).length){
        store._branding = { ...store._branding, ...res.data };
        localStorage.setItem('lspd_branding', JSON.stringify(store._branding));
        _applyBrandingObj(store._branding);
      }
    }).catch(()=>{});
  }
  function _applyBrandingObj(b){
    if(!b) return;
    store._branding = b;
    if(b.siteName){ const el=qs('.brand h1'); if(el) el.textContent=b.siteName; document.title=b.siteName; }
    if(b.loginTitle){ const lh=qs('#loginContainer h1'); if(lh) lh.textContent=b.loginTitle; else if(b.siteName){ const lh2=qs('#loginContainer h1'); if(lh2) lh2.textContent=b.siteName; } }
    else if(b.siteName){ const lh=qs('#loginContainer h1'); if(lh) lh.textContent=b.siteName; }
    if(b.loginSub){ const ls=qs('#loginContainer p[data-i18n="login_sub"]'); if(ls) ls.textContent=b.loginSub; }
    if(b.loginHeroImg){ const li=qs('#loginContainer .login-card > div:first-child'); if(li) li.innerHTML=`<img src="${esc(b.loginHeroImg)}" style="width:100%;height:100%;object-fit:contain;border-radius:50%">`; }
    if(b.subTitle){ const el=qs('.brand p'); if(el) el.textContent=b.subTitle; }

    if (!role) return false;
    return !!(role.protected || role.system || role.managed);

    return isRootOwner();

              <button type="button" onclick="toggleDiscordPermGroup('${prefix}',${gi})" style="margin-left:auto;font-size:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:2px 8px;cursor:pointer;color:#8fa0bd">All</button>

  window.filterDiscordPerms = (prefix, query) => {
    const q = query.toLowerCase();
    document.querySelectorAll(`.${prefix}_perm_item`).forEach(el => {
      const text = el.textContent.toLowerCase();
      el.style.display = !q || text.includes(q) ? '' : 'none';
    });
    document.querySelectorAll(`.${prefix}_group`).forEach(g => {
      const visible = [...g.querySelectorAll(`.${prefix}_perm_item`)].some(el=>el.style.display!=='none');
      g.style.display = visible ? '' : 'none';
    });
  };

  window.toggleDiscordPermGroup = (prefix, groupIdx) => {
    const group = document.querySelector(`.${prefix}_group[data-group="${groupIdx}"]`);
    if(!group) return;
    const checkboxes = group.querySelectorAll(`.${prefix}_dperm`);
    const allChecked = [...checkboxes].every(c=>c.checked);
    checkboxes.forEach(c => c.checked = !allChecked);
  };

  async function renderServerRoles(){
    const el = qs('#serverRoles');
    el.innerHTML = '<div class="card"><div class="card-body" style="text-align:center"><span class="spinner"></span> Loading server roles...</div></div>';
    const res = await api('GET', '/api/server-roles');
    if(!res.ok){ el.innerHTML = `<div class="card"><div class="card-body"><p style="color:#ff5a67">Failed to load: ${esc(res.reason||'error')}</p></div></div>`; return; }
    const roles = res.data || [];

    function hexColor(c){ if(!c) return '#8fa0bd'; return '#'+c.toString(16).padStart(6,'0'); }

    const rows = roles.map(r => {
      const color = hexColor(r.color);
      const permsNum = BigInt(r.permissions||'0');
      const isAdminPerm = (permsNum & 8n) > 0n;
      const canBan  = (permsNum & 4n) > 0n;
      const canKick = (permsNum & 2n) > 0n;
      const canManageRoles = (permsNum & 268435456n) > 0n;
      const permsTags = [
        isAdminPerm && '<span class="badge badge-danger" style="font-size:10px">ADMIN</span>',
        canBan  && '<span class="badge badge-warning" style="font-size:10px">BAN</span>',
        canKick && '<span class="badge badge-info" style="font-size:10px">KICK</span>',
        canManageRoles && '<span class="badge" style="background:rgba(155,89,182,.15);color:#9b59b6;font-size:10px">MANAGE ROLES</span>',
      ].filter(Boolean).join(' ');
      return `<tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="role-color-dot" style="background:${color}"></span>
            <b>${esc(r.name)}</b>
            ${r.managed?'<span class="badge badge-info" style="font-size:10px">managed</span>':''}
            ${r.isAboveBot?'':'<span class="badge badge-warning" style="font-size:10px">⬆ above bot</span>'}
          </div>
        </td>
        <td>
          <button class="btn btn-sm" style="background:rgba(47,124,255,.1);color:#2f7cff;font-size:11px;padding:4px 8px" onclick="viewRoleMembers('${esc(r.id)}','${esc(r.name)}')">
            <i class="ti ti-users"></i> ${r.memberCount}
          </button>
        </td>
        <td><div style="display:flex;gap:4px;flex-wrap:wrap">${permsTags||'<span style="color:#53617a;font-size:12px">none</span>'}</div></td>
        <td style="color:#8fa0bd;font-size:12px">${r.position}</td>
        <td>
          ${(isOwner||isFullAccess)&&r.id!=='@everyone'&&r.isAboveBot!==false?`
            <button class="btn btn-sm btn-warning" onclick="editServerRole('${esc(r.id)}','${esc(r.name)}',${r.color||0})" title="Edit"><i class="ti ti-edit"></i></button>
            <button class="btn btn-sm btn-success" onclick="addMemberToRole('${esc(r.id)}','${esc(r.name)}')" title="Add Member"><i class="ti ti-user-plus"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteServerRole('${esc(r.id)}','${esc(r.name)}')" title="Delete"><i class="ti ti-trash"></i></button>
          `:(isOwner||isFullAccess)?'<span style="color:#f3c75a;font-size:11px">⬆ Higher than bot</span>':'<span style="color:#53617a;font-size:12px">—</span>'}
        </td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="page-bg-logo">
      <div class="card">
        <div class="card-header">
          <h3><i class="ti ti-shield-star"></i> Server Roles</h3>
          ${(isOwner||isFullAccess)?'<button class="btn btn-primary" onclick="createServerRole()"><i class="ti ti-plus"></i> Create Role</button>':''}
        </div>
        <div class="card-body">
          <table>
            <thead><tr><th>Role Name</th><th>Members</th><th>Permissions</th><th>Position</th><th>Actions</th></tr></thead>
            <tbody>${rows||'<tr><td colspan="5" style="color:#8fa0bd;text-align:center">No roles found</td></tr>'}</tbody>
          </table>
        </div>
      </div>
      </div>`;
  }

  async function dccLoadStats(){
    const [membersRes, rolesRes, voiceRes] = await Promise.all([
      api('GET', '/api/discord/members?q=&limit=1000'),
      api('GET', '/api/server-roles'),
      api('GET', '/api/discord/voice').catch(()=>({ok:false})),
    ]);
    if(membersRes.ok){
      const m = membersRes.data || [];
      const el = qs('#dcc-members'); if(el) el.textContent = m.length || '0';
    } else {
      const el = qs('#dcc-members'); if(el) el.textContent = '—';
    }
    if(rolesRes.ok){
      const r = rolesRes.data || [];
      const rel = qs('#dcc-roles'); if(rel) rel.textContent = r.length;
    }
    // Voice: count members in voice channels
    if(voiceRes.ok && voiceRes.data){
      const channels = voiceRes.data || [];
      const voiceCount = channels.reduce((s,ch) => s + (ch.members?.length||0), 0);
      const vel = qs('#dcc-voice'); if(vel) vel.textContent = voiceCount;
    } else {

  window.dccCreateChannel = () => {

    qs('#modalBody').innerHTML = `<div style="display:flex;flex-direction:column;gap:12px">
      <div class="form-group"><label>Channel Name</label><input id="dcc-ech-name" value="${esc(name)}"></div>

        <div style="font-size:40px;margin-bottom:12px">${action==='mute'?'🔇':'🔕'}</div>

        <div style="display:flex;gap:8px;justify-content:center">
          <button class="btn btn-danger" onclick="dccDoVoice('${esc(userId)}','${esc(displayName)}','${field}',true)">Enable ${label}</button>

      qs('#modalCancelBtn').textContent='Close';
      openModal();
      qs('#modalConfirmBtn').style.display=''; qs('#modalCancelBtn').textContent='Cancel';

        qs('#modalConfirmBtn').className='btn btn-primary'; qs('#modalConfirmBtn').textContent='Confirm';
      };
      openModal();

  };

  window.dccFilterMembers = (q) => {
    const rows = document.querySelectorAll('#dcc-members-tbody tr');
    const lq = q.toLowerCase();
    rows.forEach(row => {
      const name = row.dataset.name || '';
      row.style.display = !lq || name.includes(lq) ? '' : 'none';
    });
  };

  window.dccMemberAction = async (userId, displayName, action) => {
    if(action === 'view'){
      qs('#modalTitle').textContent = `Member: ${displayName}`;
      qs('#modalBody').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:12px">
          <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px">
            <div style="font-size:12px;color:#53617a;margin-bottom:4px">DISCORD ID</div>
            <div style="font-family:monospace;font-weight:600">${esc(userId)}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-sm" style="background:rgba(243,199,90,.15);color:#f3c75a" onclick="dccMemberAction('${esc(userId)}','${esc(displayName)}','nickname');closeModal()"><i class="ti ti-at"></i> Set Nickname</button>
            <button class="btn btn-sm" style="background:rgba(155,89,182,.15);color:#9b59b6" onclick="dccMemberAction('${esc(userId)}','${esc(displayName)}','roles');closeModal()"><i class="ti ti-shield-star"></i> Manage Roles</button>
            <button class="btn btn-sm btn-danger" onclick="dccMemberAction('${esc(userId)}','${esc(displayName)}','kick');closeModal()"><i class="ti ti-user-minus"></i> Kick</button>
            <button class="btn btn-sm" style="background:rgba(192,57,43,.15);color:#c0392b" onclick="dccMemberAction('${esc(userId)}','${esc(displayName)}','ban');closeModal()"><i class="ti ti-ban"></i> Ban</button>
          </div>
        </div>`;
      qs('#modalConfirmBtn').style.display='none';
      qs('#modalCancelBtn').textContent='Close';
      openModal();
      qs('#modalConfirmBtn').style.display='';
      qs('#modalCancelBtn').textContent='Cancel';
    }
    if(action === 'nickname'){
      qs('#modalTitle').textContent = `Set Nickname: ${displayName}`;
      qs('#modalBody').innerHTML = `
        <div class="form-group"><label>Nickname</label><input id="dcc-nick-input" placeholder="Enter nickname..." value="${esc(store.nicknames?.[userId]||'')}"></div>
        <p style="font-size:12px;color:#8fa0bd">Leave empty to reset to Discord username</p>`;
      qs('#modalConfirmBtn').onclick = async () => {
        const nick = qs('#dcc-nick-input').value.trim();
        const r = await api('PUT', '/api/nicknames', { userId, nickname: nick });
        if(r.ok){
          store.nicknames = store.nicknames||{};
          if(nick) store.nicknames[userId] = nick; else delete store.nicknames[userId];
          closeModal(); toast('Nickname updated ✓', '#2ecc71');
          dccLogAction(`Nickname set for ${displayName}: "${nick}"`);
        } else toast('Error: '+(r.reason||'failed'),'#ff5a67');
      };
      openModal();
    }
    if(action === 'roles'){
      qs('#modalTitle').textContent = `Manage Roles: ${displayName}`;
      qs('#modalBody').innerHTML = `<div style="text-align:center;padding:20px"><span class="spinner"></span> Loading roles...</div>`;
      qs('#modalConfirmBtn').style.display='none';
      qs('#modalCancelBtn').textContent='Close';
      openModal();
      const res = await api('GET', '/api/server-roles');
      if(res.ok){
        const roles = (res.data||[]).filter(r=>r.id!=='@everyone');
        qs('#modalBody').innerHTML = `
          <p style="font-size:13px;color:#8fa0bd;margin-bottom:12px">Add or remove Discord server roles for this member</p>
          <div style="display:grid;gap:8px;max-height:300px;overflow-y:auto">
            ${roles.map(r=>{
              const color = r.color?'#'+r.color.toString(16).padStart(6,'0'):'#8fa0bd';
              return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px">
                <span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></span>
                <span style="flex:1;font-size:13px;font-weight:600">${esc(r.name)}</span>
                <button class="btn btn-sm btn-success" style="font-size:11px" onclick="dccAssignRole('${esc(r.id)}','${esc(userId)}','${esc(r.name)}','${esc(displayName)}')"><i class="ti ti-plus"></i> Add</button>
                <button class="btn btn-sm btn-danger" style="font-size:11px" onclick="dccRemoveRole('${esc(r.id)}','${esc(userId)}','${esc(r.name)}','${esc(displayName)}')"><i class="ti ti-minus"></i> Remove</button>
              </div>`;
            }).join('')}
          </div>`;
      }
      qs('#modalCancelBtn').textContent='Cancel';
      qs('#modalConfirmBtn').style.display='';
    }
    if(action === 'kick'){
      qs('#modalTitle').textContent = '⚠️ Kick Member';
      qs('#modalBody').innerHTML = `<div style="text-align:center;padding:8px 0">
        <div style="font-size:40px;margin-bottom:12px">👢</div>
        <p style="font-size:15px;margin-bottom:8px">Kick <b>${esc(displayName)}</b> from the server?</p>
        <p style="color:#ff5a67;font-size:13px">They can rejoin with an invite link.</p>
      </div>`;
      qs('#modalConfirmBtn').className='btn btn-danger';
      qs('#modalConfirmBtn').textContent='Kick';
      qs('#modalConfirmBtn').onclick = async () => {
        const r = await api('DELETE', '/api/discord/member', { userId, action:'kick' });
        if(r.ok){ closeModal(); toast(`${displayName} kicked ✓`,'#e74c3c'); dccLogAction(`Kicked: ${displayName} (${userId})`); }
        else toast('Error: '+(r.reason||'failed — Bot needs KICK_MEMBERS permission'),'#ff5a67');
        qs('#modalConfirmBtn').className='btn btn-primary'; qs('#modalConfirmBtn').textContent='Confirm';
      };
      openModal();
    }
    if(action === 'ban'){
      qs('#modalTitle').textContent = '🚫 Ban Member';
      qs('#modalBody').innerHTML = `<div style="text-align:center;padding:8px 0">
        <div style="font-size:40px;margin-bottom:12px">🔨</div>
        <p style="font-size:15px;font-weight:700;margin-bottom:8px">Ban <b>${esc(displayName)}</b>?</p>
        <div class="form-group" style="text-align:left;margin-top:12px"><label>Reason</label><input id="ban-reason" placeholder="Ban reason..."></div>
        <p style="color:#ff5a67;font-size:13px">They will be permanently banned.</p>
      </div>`;
      qs('#modalConfirmBtn').className='btn btn-danger';
      qs('#modalConfirmBtn').textContent='Ban';
      qs('#modalConfirmBtn').onclick = async () => {
        const reason = qs('#ban-reason')?.value?.trim() || 'No reason';
        const r = await api('POST', '/api/discord/ban', { userId, reason });
        if(r.ok){ closeModal(); toast(`${displayName} banned ✓`,'#c0392b'); dccLogAction(`Banned: ${displayName} (${userId}) — ${reason}`); }
        else toast('Error: '+(r.reason||'failed — Bot needs BAN_MEMBERS permission'),'#ff5a67');
        qs('#modalConfirmBtn').className='btn btn-primary'; qs('#modalConfirmBtn').textContent='Confirm';
      };
      openModal();
    }
    if(action === 'timeout'){
      qs('#modalTitle').textContent = '⏰ Timeout Member';
      qs('#modalBody').innerHTML = `<div style="text-align:center;padding:8px 0">
        <div style="font-size:40px;margin-bottom:12px">⏱️</div>
        <p style="margin-bottom:16px">Timeout <b>${esc(displayName)}</b></p>
        <div class="form-group" style="text-align:left"><label>Duration</label><select id="timeout-dur">
          <option value="60">1 Minute</option>
          <option value="300">5 Minutes</option>
          <option value="600">10 Minutes</option>
          <option value="1800">30 Minutes</option>
          <option value="3600">1 Hour</option>
          <option value="86400">1 Day</option>
          <option value="604800">1 Week</option>
        </select></div>
        <div class="form-group" style="text-align:left"><label>Reason</label><input id="timeout-reason" placeholder="Timeout reason..."></div>
      </div>`;
      qs('#modalConfirmBtn').className='btn btn-warning';
      qs('#modalConfirmBtn').textContent='Timeout';
      qs('#modalConfirmBtn').onclick = async () => {
        const dur = parseInt(qs('#timeout-dur').value);
        const reason = qs('#timeout-reason')?.value?.trim()||'No reason';
        const until = new Date(Date.now()+dur*1000).toISOString();
        const r = await api('PUT', '/api/discord/timeout', { userId, until, reason });
        if(r.ok){ closeModal(); toast(`${displayName} timed out ✓`,'#f3c75a'); dccLogAction(`Timeout: ${displayName} for ${dur}s — ${reason}`); }
        else toast('Error: '+(r.reason||'failed — Bot needs MODERATE_MEMBERS permission'),'#ff5a67');
        qs('#modalConfirmBtn').className='btn btn-primary'; qs('#modalConfirmBtn').textContent='Confirm';
      };
      openModal();
    }
  };

  window.dccAssignRole = async (roleId, userId, roleName, memberName) => {
    const r = await api('PUT', '/api/server-roles/member', { roleId, userId });
    if(r.ok){ toast(`Role "${roleName}" added to ${memberName} ✓`,'#2ecc71'); dccLogAction(`Role added: ${roleName} → ${memberName}`); }
    else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  window.dccRemoveRole = async (roleId, userId, roleName, memberName) => {
    const r = await api('DELETE', '/api/server-roles/member', { roleId, userId });
    if(r.ok){ toast(`Role "${roleName}" removed from ${memberName} ✓`,'#f3c75a'); dccLogAction(`Role removed: ${roleName} ← ${memberName}`); }
    else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  function dccLogAction(msg){
    const log = qs('#dcc-realtime-log');
    if(!log) return;
    const d = document.createElement('div');
    d.style.cssText = 'padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)';
    d.innerHTML = `<span style="color:#53617a">[${new Date().toLocaleTimeString()}]</span> <span style="color:#2ecc71">✓</span> <span style="color:#edf3ff">${esc(msg)}</span>`;
    if(log.querySelector('div[style*="Real-time"]')) log.innerHTML='';
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  // RTL languages
  const RTL_LANGS = new Set(['ar','ar_sa','ar_kw','ar_qa','ar_bh','ar_om','fa','ur','he']);

  let _currentLang = localStorage.getItem('lspd_lang') || 'en';

  function t(key) {
    const direct = I18N_BASE[_currentLang] || {};
    if(direct[key] !== undefined) return direct[key];
    // Gulf Arabic variants fall back to base Arabic
    if(_currentLang.startsWith('ar_')){
      const arBase = I18N_BASE['ar'] || {};
      if(arBase[key] !== undefined) return arBase[key];
    }
    const en = I18N_BASE.en;
    return en[key] !== undefined ? en[key] : key;
  }

  function applyTranslations() {
    // Update ALL elements with data-i18n attribute
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      const val = t(key);
      // If element has children we don't want to overwrite, skip (safety)
      if(el.childElementCount === 0) el.textContent = val;
    });
    // Update placeholder attrs
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
      el.placeholder = t(el.dataset.i18nPh);
    });
    // RTL / LTR — use LANGUAGES dir field first, then RTL_LANGS as fallback
    const langDef = LANGUAGES.find(l=>l.code===_currentLang);
    const isRTL = langDef ? langDef.dir === 'rtl' : RTL_LANGS.has(_currentLang);
    document.documentElement.dir  = isRTL ? 'rtl' : 'ltr';
    document.documentElement.lang = _currentLang;
    // Update lang selector button label
    const label = document.getElementById('currentLangLabel');
    if(label){
      const lang = LANGUAGES.find(l=>l.code===_currentLang);
      label.textContent = lang ? `${lang.flag} ${lang.name}` : 'English';
    }
    // Update logout button text (hardcoded element that may not have data-i18n)
    const logoutBtn = document.getElementById('logoutBtn');
    if(logoutBtn){
      const icon = logoutBtn.querySelector('i');
      logoutBtn.textContent = '';
      if(icon) logoutBtn.appendChild(icon);
      logoutBtn.appendChild(document.createTextNode(' ' + t('logout')));
    }
    // ✅ PATCH 2: Update topbar "Control Panel" text
    const topbarTitle = document.querySelector('.top-bar > div > b');
    if(topbarTitle) topbarTitle.textContent = t('control_panel') || 'Control Panel';
    // Update modal Cancel button if open
    const cancelBtn = document.getElementById('modalCancelBtn');
    if(cancelBtn && cancelBtn.textContent === 'Cancel') cancelBtn.textContent = t('cancel') || 'Cancel';
    const confirmBtn = document.getElementById('modalConfirmBtn');
    if(confirmBtn && confirmBtn.textContent === 'Confirm') confirmBtn.textContent = t('confirm') || 'Confirm';
  }

  function setLanguage(code) {
    _currentLang = code;
    localStorage.setItem('lspd_lang', code);
    applyTranslations();
    // Close dropdown
    const dd = document.getElementById('langDropdown');
    if(dd) dd.classList.remove('open');
    // Re-render current active page so all dynamic content updates
    const activePage = document.querySelector('.nav button.active')?.dataset?.page;
    if(activePage && PAGE_RENDERERS[activePage]) PAGE_RENDERERS[activePage]();
    toast(`🌐 ${LANGUAGES.find(l=>l.code===code)?.name || code}`, '#2f7cff');
  }
  window.setLanguage = setLanguage;

  window.toggleLangDropdown = () => {
    const dd = document.getElementById('langDropdown');
    if(!dd) return;
    dd.classList.toggle('open');
    if(dd.classList.contains('open')) {
      buildLangList('');
      const inp = document.getElementById('langSearch');
      if(inp) { inp.value=''; inp.focus(); }
    }
  };

  window.filterLangs = (q) => buildLangList(q);

  function buildLangList(filter) {
    const list = document.getElementById('langList');
    if(!list) return;
    const f = filter.toLowerCase();
    const filtered = LANGUAGES.filter(l => l.name.toLowerCase().includes(f) || l.code.includes(f));
    list.innerHTML = filtered.map(l=>`
      <div class="lang-option ${l.code===_currentLang?'active':''}" onclick="setLanguage('${l.code}')">
        <span style="font-size:18px">${l.flag}</span>
        <span>${l.name}</span>
        ${l.code===_currentLang?'<i class="ti ti-check" style="margin-left:auto;color:#2f7cff"></i>':''}
      </div>`).join('');
  }

  // Close lang dropdown on outside click
  document.addEventListener('click', e => {
    const btn = document.getElementById('langSelectorBtn');
    const dd  = document.getElementById('langDropdown');
    if(btn && dd && !btn.contains(e.target) && !dd.contains(e.target)) {
      dd.classList.remove('open');
    }
  });

  // ═══════════════════════════ INITIALIZATION ═══════════════════════════
  async function init(){
    // Apply saved language immediately
    applyTranslations();
    // Apply saved branding immediately
    applyStoredBranding();

    const loginBtn = qs('#discordLoginBtn');
    if(loginBtn) loginBtn.onclick = loginDiscord;

    const logoutBtn = qs('#logoutBtn');
    if(logoutBtn) logoutBtn.onclick = () => { clearSession(); location.reload(); };

    const mobileBtn = qs('#mobileMenuBtn');
    if(mobileBtn) mobileBtn.onclick = () => qs('#sidebar')?.classList.toggle('open');

    const closeBtn = qs('#closeModalBtn');
    if(closeBtn) closeBtn.onclick = window.closeModal;
    const cancelBtn = qs('#modalCancelBtn');
    if(cancelBtn) cancelBtn.onclick = window.closeModal;

    const modal = qs('#globalModal');
    if(modal) modal.addEventListener('click', (e) => {
      if(e.target === modal) window.closeModal();
    });

    qsa('.nav button').forEach(b => {
      b.onclick = () => navigate(b.dataset.page);
    });

    setInterval(() => {
      const clockEl = qs('#clock');
      if(clockEl) clockEl.textContent = fmtTime(Date.now());
    }, 1000);

    // ✅ FIX: Periodically re-validate session with server to catch role revocations
    // Runs every 5 minutes while user is active — forces logout/permission downgrade if role removed
    setInterval(async () => {
      if(!accessToken) return;
      console.log('[Auth] Periodic session re-validation...');
      const prevIsAdmin = isAdmin;
      const prevIsOwner = isOwner;
      const valid = await validateSessionWithServer();
      if(!valid){
        console.warn('[Auth] Periodic check: session invalid — logging out');
        clearSession(); location.reload(); return;
      }
      // If permissions changed — update UI immediately without full reload
      if(prevIsAdmin !== isAdmin || prevIsOwner !== isOwner){
        console.warn(`[Auth] Periodic check: permissions changed! isAdmin: ${prevIsAdmin}→${isAdmin}`);
        bootApp();
        navigate('dashboard');
        toast('Your permissions were updated by an administrator','#f3c75a');
      }
    }, 5 * 60 * 1000);

    // ✅ Step 1: تحقق من OAuth callback أو session محفوظة
    const oauthSuccess = await handleOAuth();
    console.log('[Init] OAuth callback result:', oauthSuccess);

    const sessionLoaded = oauthSuccess || loadSession();
    console.log('[Init] Session loaded:', sessionLoaded, '| user:', currentUser?.id || 'none');

    if(sessionLoaded){
      console.log('[Init] Validating session with server...');
      const serverOk = await validateSessionWithServer();
      console.log('[Init] Server validation result:', serverOk);

      if(!serverOk){
        console.warn('[Init] Server rejected session — showing login page');
        qs('#loginContainer').style.display = 'grid';
        qs('#appContainer').style.display   = 'none';
        if(!qs('#loginMessage').textContent) {
          qs('#loginMessage').textContent = 'Session expired or access revoked. Please login again.';
        }
        return;
      }

      console.log('[Init] ✅ Session valid — booting dashboard');
      bootApp();
      await loadAllData();
      navigate('dashboard');
      console.log('[Init] ✅ Redirecting to dashboard complete');

      // ✅ FIX 8: Register/update current user in Discord Users list after login
      if(currentUser && accessToken){
        try {
          await fetch(CFG.WORKER_URL + '/api/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
            body: JSON.stringify({
              id: currentUser.id,
              username: currentUser.username,
              avatar: currentUser.avatar || null,
              isAdmin: isAdmin,
              isOwner: isOwner,
              internalRank: currentUser.internalRank || (isOwner ? 'ownership' : isAdmin ? 'Admin' : 'Officer'),
            })
          });
          // Refresh users list in store
          const freshData = await api('GET', '/api/data');
          if(freshData.ok && freshData.users) store.users = freshData.users;
        } catch(e) { console.warn('[Init] Register/refresh users failed (non-fatal):', e.message); }
      }
    } else {
      console.log('[Init] No session — showing login page');
    }
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
