<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHJ LSPD | نظام إدارة الشرطة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    /* نفس الـ CSS السابق – لم يتغير */
    :root{--bg:#070b13;--panel:#101827;--panel2:#151f33;--panel3:#1b2942;--line:rgba(255,255,255,.09);--text:#edf3ff;--muted:#8fa0bd;--weak:#53617a;--blue:#2f7cff;--gold:#f3c75a;--green:#10d987;--red:#ff5a67;--cyan:#27e6ff;--radius:18px;--shadow:0 24px 70px rgba(0,0,0,.35)}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:Cairo,system-ui,sans-serif;background:radial-gradient(circle at top right,rgba(47,124,255,.18),transparent 34%),radial-gradient(circle at bottom left,rgba(243,199,90,.08),transparent 32%),var(--bg);color:var(--text);min-height:100vh} button,input,select,textarea{font-family:inherit}.hide{display:none!important}.mono{font-family:ui-monospace,Consolas,monospace}.muted{color:var(--muted)}.weak{color:var(--weak)}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(460px,100%);background:linear-gradient(145deg,rgba(16,24,39,.96),rgba(7,11,19,.98));border:1px solid var(--line);border-radius:28px;padding:32px;box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden}.login-card:before{content:"";position:absolute;inset:0 15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
    .badge{width:92px;height:92px;border-radius:50%;margin:0 auto 18px;display:grid;place-items:center;font-size:42px;background:radial-gradient(circle,#18315a,#071021);border:2px solid var(--gold);box-shadow:0 0 42px rgba(243,199,90,.18)}.title{font-size:28px;font-weight:900;letter-spacing:1px}.subtitle{font-size:13px;color:var(--muted);margin:8px 0 22px}.hint{background:rgba(47,124,255,.08);border:1px solid rgba(47,124,255,.2);color:#bcd3ff;border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.8;margin-bottom:16px;text-align:right}
    .btn{border:0;border-radius:14px;padding:11px 16px;cursor:pointer;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.18s;text-decoration:none;color:white}.btn:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,var(--blue),#7258ff)}.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}.btn-gold{background:rgba(243,199,90,.14);border:1px solid rgba(243,199,90,.3);color:var(--gold)}.btn-red{background:rgba(255,90,103,.13);border:1px solid rgba(255,90,103,.28);color:#ff9aa3}.btn-green{background:rgba(16,217,135,.12);border:1px solid rgba(16,217,135,.26);color:var(--green)}.btn-sm{padding:7px 10px;border-radius:10px;font-size:12px}.btn-wide{width:100%}
    .app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:rgba(10,15,25,.88);border-left:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh;overflow:auto;backdrop-filter:blur(16px)}.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.brand-icon{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:#0b1730;border:1px solid rgba(243,199,90,.55);font-size:22px}.brand h1{font-size:16px}.brand p{font-size:11px;color:var(--weak)}.nav-title{font-size:11px;color:var(--weak);font-weight:900;margin:18px 8px 8px}.nav button{width:100%;justify-content:flex-start;background:transparent;border:1px solid transparent;color:var(--muted);padding:11px 12px;border-radius:14px;margin:3px 0}.nav button:hover,.nav button.active{background:rgba(47,124,255,.11);border-color:rgba(47,124,255,.22);color:#dbe8ff}.nav .admin-only{display:none}.is-admin .admin-only{display:inline-flex}
    .main{min-width:0}.top{height:70px;border-bottom:1px solid var(--line);background:rgba(7,11,19,.68);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:5;backdrop-filter:blur(16px)}.user{display:flex;align-items:center;gap:10px}.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#9c4dff);display:grid;place-items:center;font-weight:900;overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover}.role{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--gold)}.content{padding:24px;max-width:1480px;margin:0 auto}.page{display:none}.page.active{display:block;animation:show .22s ease}@keyframes show{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px}.page-head h2{font-size:24px}.page-head p{color:var(--muted);font-size:13px;margin-top:4px}.grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:16px}.card{background:linear-gradient(145deg,rgba(16,24,39,.92),rgba(14,21,35,.92));border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 35px rgba(0,0,0,.15);overflow:hidden}.card-pad{padding:18px}.stat{position:relative}.stat i{font-size:26px;color:var(--blue)}.stat small{display:block;color:var(--weak);font-weight:900;font-size:11px;margin-top:8px}.stat b{font-size:28px;display:block}.card-title{padding:15px 18px;border-bottom:1px solid var(--line);font-weight:900;display:flex;align-items:center;justify-content:space-between;gap:12px}.two{grid-template-columns:1.2fr .8fr}.three{grid-template-columns:repeat(3,1fr)}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.input,.select,textarea,input,select{background:#0b1220;border:1px solid var(--line);border-radius:12px;color:var(--text);padding:10px 12px;outline:none}.input{min-width:230px;flex:1}.input:focus,.select:focus,textarea:focus,input:focus,select:focus{border-color:rgba(47,124,255,.55)}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:12px 14px;text-align:right;border-bottom:1px solid var(--line)}th{color:var(--weak);font-size:11px;text-transform:uppercase;background:rgba(255,255,255,.025)}tr:hover td{background:rgba(255,255,255,.02)}.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:900;border:1px solid var(--line);color:var(--muted)}.pill.green{color:var(--green);background:rgba(16,217,135,.08);border-color:rgba(16,217,135,.25)}.pill.gold{color:var(--gold);background:rgba(243,199,90,.08);border-color:rgba(243,199,90,.25)}.pill.red{color:#ff8d96;background:rgba(255,90,103,.08);border-color:rgba(255,90,103,.25)}.progress{height:9px;background:#08101d;border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:99px}.list{display:grid;gap:10px}.item{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:14px;padding:12px}.item h4{font-size:14px}.item p{font-size:12px;color:var(--muted);margin-top:4px}.code-card{cursor:pointer}.code-card:hover{border-color:rgba(39,230,255,.3)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;place-items:center;padding:18px;z-index:50}.modal.open{display:grid}.box{width:min(620px,100%);background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.box-head,.box-foot{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.box-foot{border-top:1px solid var(--line);border-bottom:0;justify-content:flex-start;gap:8px}.box-body{padding:18px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:800}.field input,.field select,.field textarea{width:100%}.toast{position:fixed;left:20px;bottom:20px;background:var(--panel2);border:1px solid var(--line);padding:12px 14px;border-radius:14px;box-shadow:var(--shadow);display:none;z-index:99}.toast.show{display:block}.mobile-menu{display:none}
    @media(max-width:900px){.app{grid-template-columns:1fr}.side{position:fixed;right:-280px;z-index:20;transition:.25s}.side.open{right:0}.mobile-menu{display:inline-flex}.stats,.two,.three{grid-template-columns:1fr}.content{padding:16px}.top{padding:0 14px}.page-head{flex-direction:column}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
