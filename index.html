<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHJ LSPD | Complete Police Command System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:#070b13; color:#edf3ff; min-height:100vh; }
    body::before { content:''; position:fixed; inset:0;
      background: radial-gradient(circle at 20% 30%,rgba(47,124,255,.12),transparent 55%),
                  radial-gradient(circle at 85% 70%,rgba(243,199,90,.08),transparent 50%);
      pointer-events:none; z-index:-1; }

    .app { display:grid; grid-template-columns:280px 1fr; min-height:100vh; }
    .sidebar { background:rgba(10,15,25,.92); backdrop-filter:blur(16px);
      border-right:1px solid rgba(255,255,255,.08); padding:24px 16px;
      position:sticky; top:0; height:100vh; overflow-y:auto; z-index:10; }

    .brand { display:flex; align-items:center; gap:12px; margin-bottom:32px;
      padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,.1); }
    .brand-icon { width:48px; height:48px; background:#0b1730; border:2px solid #f3c75a;
      border-radius:50%; display:grid; place-items:center; font-size:26px; }
    .brand h1 { font-size:18px; font-weight:800; }
    .brand p  { font-size:11px; color:#8fa0bd; }

    .nav-title { font-size:11px; font-weight:800; text-transform:uppercase;
      letter-spacing:1px; color:#53617a; margin:24px 0 12px 8px; }
    .nav button { width:100%; text-align:left; background:transparent; border:none;
      color:#8fa0bd; padding:12px 16px; border-radius:14px; font-weight:600;
      display:flex; align-items:center; gap:12px; cursor:pointer; transition:.2s; margin-bottom:6px; }
    .nav button i { font-size:20px; }
    .nav button.active,.nav button:hover { background:rgba(47,124,255,.12); color:white; }

    .main { min-width:0; }
    .top-bar { height:70px; background:rgba(7,11,19,.7); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center;
      justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:10; }
    .user-info { display:flex; align-items:center; gap:16px; }
    .avatar { width:42px; height:42px; background:linear-gradient(135deg,#2f7cff,#9c4dff);
      border-radius:50%; display:grid; place-items:center; font-weight:bold; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .role-badge { background:rgba(243,199,90,.15); border:1px solid rgba(243,199,90,.3);
      border-radius:40px; padding:4px 12px; font-size:12px; font-weight:600; color:#f3c75a; }

    .content { padding:28px 32px; max-width:1600px; }
    .page { display:none; animation:fadeIn .25s ease; }
    .page.active { display:block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .card { background:rgba(16,24,39,.8); backdrop-filter:blur(4px);
      border:1px solid rgba(255,255,255,.08); border-radius:24px; overflow:hidden; margin-bottom:28px; }
    .card-header { padding:18px 24px; border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
    .card-header h3 { font-size:18px; font-weight:700; }
    .card-body { padding:24px; }

    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:32px; }
    .stat-card { background:rgba(16,24,39,.6); border:1px solid rgba(255,255,255,.08);
      border-radius:20px; padding:20px; text-align:center; transition:.2s; }
    .stat-card i { font-size:32px; color:#2f7cff; margin-bottom:12px; }
    .stat-card .value { font-size:32px; font-weight:800; }
    .stat-card .label { color:#8fa0bd; font-size:13px; margin-top:4px; }

    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:14px 10px; border-bottom:1px solid rgba(255,255,255,.06); }
    th { color:#8fa0bd; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
    /* Hover highlight for all data rows */
    .data-row { transition:background .15s; }
    .data-row:hover { background:rgba(47,124,255,.06); }
    tr:hover td { background:rgba(47,124,255,.04); }

    .officer-row { display:flex; justify-content:space-between; align-items:center;
      padding:14px 0; border-bottom:1px solid rgba(255,255,255,.08); }
    .officer-row:last-child { border-bottom:none; }
    .divider { height:1px; background:rgba(255,255,255,.06); margin:12px 0; }

    .btn { border:none; border-radius:12px; padding:8px 16px; font-weight:600; cursor:pointer;
      display:inline-flex; align-items:center; gap:8px; transition:.2s;
      background:rgba(255,255,255,.05); color:white; }
    .btn-primary { background:linear-gradient(135deg,#2f7cff,#7258ff); }
    .btn-danger  { background:rgba(255,90,103,.2); color:#ff5a67; border:1px solid rgba(255,90,103,.3); }
    .btn-warning { background:rgba(243,199,90,.15); color:#f3c75a; border:1px solid rgba(243,199,90,.3); }
    .btn-success { background:rgba(46,204,113,.15); color:#2ecc71; border:1px solid rgba(46,204,113,.3); }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }

    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:6px; font-size:13px; font-weight:600; color:#8fa0bd; }
    input,select,textarea { width:100%; background:#0b1220; border:1px solid rgba(255,255,255,.12);
      border-radius:14px; padding:12px 14px; color:white; font-family:inherit; }
    textarea { resize:vertical; min-height:80px; }

    .modal { position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(8px);
      display:none; place-items:center; z-index:1000; }
    .modal.open { display:grid; }
    .modal-content { background:#101827; border:1px solid rgba(255,255,255,.1);
      border-radius:28px; width:min(650px,90%); max-height:85vh; overflow-y:auto; }
    .modal-header,.modal-footer { padding:18px 24px; border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; justify-content:space-between; align-items:center; }
    .modal-footer { border-bottom:none; border-top:1px solid rgba(255,255,255,.08); justify-content:flex-end; gap:12px; }
    .modal-body { padding:24px; }

    .toast { position:fixed; bottom:24px; left:24px; background:#1b2942;
      border-left:4px solid #2f7cff; padding:12px 20px; border-radius:12px;
      display:none; z-index:1100; box-shadow:0 8px 24px rgba(0,0,0,.3); }
    .toast.show { display:block; }

    .login-container { min-height:100vh; display:grid; place-items:center; padding:24px; }
    .login-card { max-width:460px; background:linear-gradient(145deg,#101827,#070b13);
      border:1px solid rgba(255,255,255,.1); border-radius:32px; padding:40px 32px;
      text-align:center; box-shadow:0 24px 48px rgba(0,0,0,.4); }

    .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,.2);
      border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-active  { background:rgba(46,204,113,.15); color:#2ecc71; }
    .badge-inactive{ background:rgba(255,90,103,.15); color:#ff5a67; }
    .badge-info    { background:rgba(52,152,219,.15); color:#3498db; }
    .badge-warning { background:rgba(243,199,90,.15); color:#f3c75a; }
    .badge-danger  { background:rgba(255,90,103,.15); color:#ff5a67; }

    .points-bar { height:6px; background:#1b2942; border-radius:99px; overflow:hidden; margin-top:4px; }
    .points-bar-fill { height:100%; background:linear-gradient(90deg,#2f7cff,#7258ff); border-radius:99px; }

    .mobile-menu { display:none; }

    /* ── Permissions System Styles ── */
    .perm-group { margin-bottom:24px; }
    .perm-group-title {
      font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px;
      color:#8fa0bd; margin-bottom:12px; display:flex; align-items:center; gap:8px;
    }
    .perm-group-title::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.08); }
    .perm-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
    .perm-item {
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07);
      border-radius:14px; padding:12px 14px; display:flex; align-items:flex-start; gap:10px;
      cursor:pointer; transition:.15s; user-select:none;
    }
    .perm-item:hover { border-color:rgba(47,124,255,.3); background:rgba(47,124,255,.06); }
    .perm-item.checked { border-color:rgba(47,124,255,.5); background:rgba(47,124,255,.1); }
    .perm-item input[type=checkbox] { width:16px; height:16px; margin:2px 0 0; flex-shrink:0;
      accent-color:#2f7cff; cursor:pointer; }
    .perm-item-label { font-size:13px; font-weight:600; }
    .perm-item-desc  { font-size:11px; color:#8fa0bd; margin-top:2px; }
    .role-card {
      background:rgba(16,24,39,.8); border:1px solid rgba(255,255,255,.08);
      border-radius:20px; padding:20px; margin-bottom:16px; position:relative;
    }
    .role-card-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .role-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .role-card-actions { margin-left:auto; display:flex; gap:8px; }
    .members-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .member-chip {
      background:rgba(47,124,255,.12); border:1px solid rgba(47,124,255,.25);
      border-radius:20px; padding:4px 10px; font-size:12px; display:flex; align-items:center; gap:6px;
    }
    .member-chip button { background:none; border:none; color:#ff5a67; cursor:pointer; font-size:14px; padding:0; line-height:1; }

    @media(max-width:800px){
      .app { grid-template-columns:1fr; }
      .sidebar { position:fixed; right:-280px; transition:.2s; height:100vh; z-index:20; }
      .sidebar.open { right:0; }
      .mobile-menu { display:inline-flex; }
      .stats-grid { grid-template-columns:1fr 1fr; }
      .content { padding:20px; }
    }
  </style>
</head>
<body>

<div id="loginContainer" class="login-container">
  <div class="login-card">
    <div style="width:80px;height:80px;background:#0b1730;border:2px solid #f3c75a;border-radius:50%;display:grid;place-items:center;font-size:40px;margin:0 auto 20px">🛡️</div>
    <h1 style="font-size:28px;font-weight:900">SHJ LSPD</h1>
    <p style="color:#8fa0bd;margin:8px 0 24px">Complete Police Management System</p>
    <button id="discordLoginBtn" class="btn btn-primary" style="width:100%;justify-content:center">
      <i class="ti ti-brand-discord"></i> Login with Discord
    </button>
    <p id="loginMessage" style="margin-top:16px;font-size:13px;color:#8fa0bd"></p>
  </div>
</div>

<div id="appContainer" class="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div><h1>SHJ LSPD</h1><p>Command Center</p></div>
    </div>
    <nav class="nav">
      <div class="nav-title">Main</div>
      <button class="active" data-page="dashboard"><i class="ti ti-dashboard"></i> Dashboard</button>
      <button data-page="officers"><i class="ti ti-users"></i> Officers</button>
      <button data-page="ranks"><i class="ti ti-stairs-up"></i> Ranks</button>
      <button data-page="points"><i class="ti ti-chart-bar"></i> Points Logs</button>
      <button data-page="laws"><i class="ti ti-book"></i> Laws & Rules</button>
      <button data-page="uniform"><i class="ti ti-shirt"></i> Uniform Guide</button>
      <button data-page="codes"><i class="ti ti-radio"></i> Police Codes</button>
      <button data-page="wanted"><i class="ti ti-car"></i> Wanted & Impound</button>
      <button data-page="cases"><i class="ti ti-folder"></i> Cases</button>
      <button data-page="reports"><i class="ti ti-file-text"></i> Reports</button>
      <div class="nav-title">Administration</div>
      <button data-page="adminRoles"><i class="ti ti-shield-lock"></i> Role Management</button>
      <button data-page="discordUsers"><i class="ti ti-brand-discord"></i> Discord Users</button>
      <button data-page="logs"><i class="ti ti-history"></i> System Logs</button>
      <button data-page="settings"><i class="ti ti-settings"></i> Settings</button>
    </nav>
  </aside>

  <main class="main">
    <div class="top-bar">
      <button class="btn mobile-menu" id="mobileMenuBtn"><i class="ti ti-menu-2"></i></button>
      <div><b>Control Panel</b><div id="clock" style="font-size:12px;color:#8fa0bd"></div></div>
      <div class="user-info">
        <div class="avatar" id="userAvatar">U</div>
        <div><b id="userName">User</b><div id="userRole" class="role-badge">Officer</div></div>
        <button id="logoutBtn" class="btn" style="background:rgba(255,90,103,.15);color:#ff5a67">
          <i class="ti ti-logout"></i> Logout
        </button>
      </div>
    </div>
    <div class="content">
      <div id="dashboard"    class="page active"></div>
      <div id="officers"     class="page"></div>
      <div id="ranks"        class="page"></div>
      <div id="points"       class="page"></div>
      <div id="laws"         class="page"></div>
      <div id="uniform"      class="page"></div>
      <div id="codes"        class="page"></div>
      <div id="wanted"       class="page"></div>
      <div id="cases"        class="page"></div>
      <div id="reports"      class="page"></div>
      <div id="adminRoles"    class="page"></div>
      <div id="discordUsers" class="page"></div>
      <div id="logs"         class="page"></div>
      <div id="settings"     class="page"></div>
    </div>
  </main>
</div>

<div id="globalModal" class="modal">
  <div class="modal-content" id="modalContent">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="btn btn-sm" id="closeModalBtn">✕</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" id="modalCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>
<div id="toastMessage" class="toast"></div>

<script>
(function(){
  // ═══════════════════════════ CONFIG ═══════════════════════════
  const CFG = {
    WORKER_URL:        'https://lspd.oabbmb.workers.dev',
    DISCORD_CLIENT_ID: '1505897669334138940',
    GUILD_ID:          '1154498662286770179',
  };

  // ═══════════════════════════ STATE ════════════════════════════
  let currentUser = null;
  let isAdmin     = false;
  let isOwner     = false;   // ✅ NEW: separate ownership flag
  let accessToken = null;
  let userPermissions = [];
  let store = {
    officers:[], ranks:[], pointsLog:[], laws:[], uniforms:[],
    codes:[], wanted:[], impound:[], cases:[], reports:[],
    users:[], activity:[], settings:{ webhookUrl:'', logsEnabled:true },
    adminRoles:[],
  };

  // ═══════════════════════════ UTILS ════════════════════════════
  const qs  = (s,p=document) => p.querySelector(s);
  const qsa = (s,p=document) => [...p.querySelectorAll(s)];
  function esc(str){ return String(str??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }
  function toast(msg,color='#2f7cff'){
    const t=qs('#toastMessage');
    if(t){ t.textContent=msg; t.style.borderLeftColor=color; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),3000); }
  }
  function fmtTime(ts){ return ts ? new Date(ts).toLocaleString('en-US') : '-'; }

  // ═══════════════════════════ API ENGINE ══════════════════════════
  async function api(method, path, body=null){
    const opts = { method, headers: { 'Content-Type':'application/json' } };
    if(accessToken) opts.headers['Authorization'] = 'Bearer '+accessToken;
    if(body) opts.body = JSON.stringify(body);
    try {
      const res = await fetch(CFG.WORKER_URL + path, opts);
      let data;
      try { data = await res.json(); } catch(e) { return { ok:false, reason:'invalid_json_response' }; }
      if(!data.ok && data.reason) console.warn('API warn:', data.reason);
      return data;
    } catch(e){ console.error('API error:', e); return { ok:false, reason: e.message }; }
  }

  function hasPerm(perm) {
    if (isAdmin) return true;
    if (userPermissions.includes('full_access')) return true;
    return userPermissions.includes(perm);
  }

  async function loadAllData(){
    const data = await api('GET', '/api/data');
    if(data.ok){
      ['officers','ranks','pointsLog','laws','uniforms','codes',
       'wanted','impound','cases','reports','users','activity','settings'
      ].forEach(k => { if(data[k] !== undefined) store[k] = data[k]; });
    }
    // تحميل الرتب الداخلية
    const rolesData = await api('GET', '/api/adminRoles');
    if(rolesData.ok) store.adminRoles = rolesData.data || [];
  }

  // ═══════════════════════════ SESSION ══════════════════════════
  function saveSession(user, admin, token, owner = false){
    localStorage.setItem('lspd_session', JSON.stringify({ user, isAdmin: admin, isOwner: owner, token, ts: Date.now() }));
    currentUser = user; isAdmin = admin; isOwner = owner; accessToken = token;
  }
  function loadSession(){
    try {
      const s = JSON.parse(localStorage.getItem('lspd_session') || 'null');
      if (!s) return false;
      if (Date.now() - s.ts > 12 * 3600 * 1000) { localStorage.removeItem('lspd_session'); return false; }
      currentUser = s.user; isAdmin = s.isAdmin; isOwner = s.isOwner === true; accessToken = s.token;
      return true;
    } catch { return false; }
  }
  function clearSession(){
    localStorage.removeItem('lspd_session');
    currentUser = null; isAdmin = false; isOwner = false; accessToken = null;
  }

  async function validateSessionWithServer(){
    if (!accessToken) {
      console.warn('[Auth] validateSessionWithServer: no accessToken — skipping');
      return false;
    }
    console.log('[Auth] Validating session with server — user:', currentUser?.id);
    try {
      const r = await api('GET', '/api/me');
      if (!r.ok) {
        console.warn('[Auth] /api/me returned not ok:', r.error || r.reason);
        if (r.error === 'unauthorized' || r.reason === 'unauthorized') {
          console.warn('[Auth] Token invalid — clearing session');
          clearSession();
        }
        return false;
      }
      // ✅ PRIORITY: ownership > admin — re-evaluate on every login, no cache
      isOwner  = r.isOwner === true;
      isAdmin  = r.isAdmin === true;
      userPermissions = r.permissions || [];
      if (currentUser) currentUser = { ...currentUser, ...(r.user || {}), internalRank: r.internalRank };
      saveSession(currentUser, isAdmin, accessToken, isOwner);
      console.log('[Auth] Server validation OK — isOwner:', isOwner, '| isAdmin:', isAdmin, '| rank:', r.internalRank);
      return true;
    } catch (e) {
      console.error('[Auth] Session validation network error (keeping session):', e.message);
      return true;
    }
  }

  // ═══════════════════════════ DISCORD OAUTH ════════════════════
  function loginDiscord() {
    const redirectUri = 'https://lspd.oabbmb.workers.dev/api/auth/callback';
    const clientId = '1505897669334138940';
    const scope = 'identify guilds guilds.members.read';

    const params = new URLSearchParams({
      client_id: clientId,
      redirect_uri: redirectUri,
      response_type: 'code',
      scope: scope,
    });

    location.href = 'https://discord.com/oauth2/authorize?' + params.toString();
  }

  async function handleOAuth() {
    const params       = new URLSearchParams(location.search);
    const token        = params.get('access_token');
    const userParam    = params.get('user');
    const isAdminParam = params.get('isAdmin');
    const isOwnerParam = params.get('isOwner');   // ✅ NEW
    const authError    = params.get('auth_error');
    const errorDesc    = params.get('error_desc');

    if (authError) {
      console.warn('[Auth] OAuth returned error:', authError, '—', errorDesc);
      history.replaceState({}, '', location.pathname);
      const msgEl = qs('#loginMessage');
      if (msgEl) {
        const msgs = {
          not_in_guild:          'You are not in the required Discord server.',
          missing_role:          'You do not have the required role in the server.',
          server_misconfigured:  'Server configuration error. Contact admin.',
          invalid_bot_token:     'Bot token error. Contact admin.',
          bot_permission_denied: 'Bot permission error. Contact admin.',
          unauthorized:          'Access denied. Missing required role.',
        };
        msgEl.textContent = msgs[authError] || ('Access denied: ' + (errorDesc || authError));
        msgEl.style.color = '#ff5a67';
      }
      return false;
    }

    if (!token || !userParam) return false;

    let user;
    try {
      user = JSON.parse(decodeURIComponent(userParam));
    } catch (e) {
      console.error('[Auth] Failed to parse user data from OAuth redirect:', e);
      return false;
    }

    // ✅ HARD CHECK: if user.internalRank === 'ownership' — force isOwner=true regardless of param
    const owner = isOwnerParam === 'true' || user.internalRank === 'ownership';
    const admin = isAdminParam === 'true' || owner; // ownership implies admin
    console.log('[Auth] OAuth success — User:', user.id, '|', user.username);
    console.log('[Auth] isOwner:', owner, '| isAdmin:', admin, '| rank:', user.internalRank);

    saveSession(user, admin, token, owner);
    history.replaceState({}, '', location.pathname);
    return true;
  }

  function bootApp(){
    qs('#loginContainer').style.display = 'none';
    qs('#appContainer').style.display   = 'grid';
    document.body.classList.toggle('is-admin', isAdmin);
    document.body.classList.toggle('is-owner', isOwner);

    const av = qs('#userAvatar');
    if (currentUser?.avatar) av.innerHTML = `<img src="${currentUser.avatar}" alt="avatar">`;
    else av.textContent = (currentUser?.username?.[0] || 'U').toUpperCase();
    qs('#userName').textContent = currentUser?.username || 'User';

      roleBadge.textContent = 'Admin';

      roleBadge.textContent = 'Officer';

    const ownerOnlyPages = ['adminRoles', 'logs', 'settings'];
    qsa('.nav button[data-page]').forEach(btn => {

  function buildPermCheckboxes(selectedPerms, prefix='perm') {
    const groups = {};
    for (const [key, info] of Object.entries(ALL_PERMS_STATIC)) {
      if (!groups[info.group]) groups[info.group] = [];
      groups[info.group].push({ key, ...info });
    }
    return Object.entries(groups).map(([group, perms]) => {
      const gInfo = PERM_GROUPS[group] || { icon:'ti-circle', color:'#8fa0bd' };
      return `
        <div class="perm-group">
          <div class="perm-group-title">
            <i class="ti ${gInfo.icon}" style="color:${gInfo.color}"></i> ${group}
          </div>
          <div class="perm-grid">
            ${perms.map(p => {
              const checked = selectedPerms.includes(p.key);
              return `<label class="perm-item ${checked?'checked':''}" onclick="this.classList.toggle('checked');this.querySelector('input').click()">
                <input type="checkbox" name="${prefix}" value="${esc(p.key)}" ${checked?'checked':''} onclick="event.stopPropagation()">
                <div>
                  <div class="perm-item-label">${esc(p.label)}</div>
                  <div class="perm-item-desc">${esc(p.desc)}</div>
                </div>
              </label>`;
            }).join('')}
          </div>
        </div>`;
    }).join('');
  }

  function getSelectedPerms(prefix='perm') {
    return [...document.querySelectorAll(`input[name="${prefix}"]:checked`)].map(el => el.value);
  }

          </div>
          <div>
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8fa0bd;margin-bottom:6px">
              Members by Discord ID (${(role.members||[]).length})
            </div>
            <div class="members-list">${membersHtml || '<span style="color:#53617a;font-size:12px">No members added</span>'}</div>
            <div style="display:flex;gap:8px;margin-top:10px">
              <input id="newMember_${esc(role.id)}" placeholder="Discord User ID" style="max-width:240px;padding:8px 12px;font-size:13px">
              <button class="btn btn-sm btn-success" onclick="addRoleMember('${esc(role.id)}')"><i class="ti ti-plus"></i> Add</button>
            </div>
          </div>
        </div>`;
    }).join('') || '<p style="color:#8fa0bd;text-align:center;padding:24px">No roles created yet</p>';

    qs('#adminRoles').innerHTML = `
      <div class="card">
        <div class="card-header">
          <h3><i class="ti ti-shield-lock"></i> Role Management</h3>
          <button class="btn btn-primary" onclick="createRoleModal()"><i class="ti ti-plus"></i> New Role</button>
        </div>
        <div class="card-body">${roleCards}</div>
      </div>`;
  }

  window.createRoleModal = () => {
    qs('#modalTitle').textContent = 'Create New Role';
    qs('#modalContent').style.maxWidth = '700px';
    qs('#modalBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
        <div class="form-group" style="margin:0"><label>Role Name</label><input id="newRoleName" placeholder="e.g. Supervisor"></div>
        <div class="form-group" style="margin:0"><label>Color</label><input id="newRoleColor" type="color" value="#2f7cff" style="height:44px;padding:4px"></div>
      </div>
      <div class="form-group"><label>Discord Role ID <span style="color:#8fa0bd;font-weight:400">(optional — leave blank for member-only access)</span></label>
        <input id="newRoleDiscordId" placeholder="e.g. 1234567890123456789"></div>
      <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:#8fa0bd">Permissions</div>
      ${buildPermCheckboxes(['access_dashboard'],'newperm')}`;
    qs('#modalConfirmBtn').textContent = 'Create Role';
    qs('#modalConfirmBtn').onclick = async () => {
      const name = qs('#newRoleName').value.trim();
      if (!name) { toast('Role name is required','#ff5a67'); return; }
      const payload = {
        name,
        color: qs('#newRoleColor').value,
        discordRoleId: qs('#newRoleDiscordId').value.trim(),
        permissions: getSelectedPerms('newperm'),
        members: [],
      };
      const r = await api('POST','/api/adminRoles', payload);
      if (r.ok) {
        store.adminRoles.push(r.data);
        renderAdminRoles();
        closeModal();
        toast('Role created ✓');
      } else toast('Error: '+(r.reason||'failed'),'#ff5a67');
    };
    openModal();
  };

  window.editRoleModal = async (id) => {
    const role = (store.adminRoles||[]).find(r=>r.id===id);
    if (!role) return;
    qs('#modalTitle').textContent = 'Edit Role: '+role.name;
    qs('#modalBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
        <div class="form-group" style="margin:0"><label>Role Name</label><input id="editRoleName" value="${esc(role.name)}"></div>
        <div class="form-group" style="margin:0"><label>Color</label><input id="editRoleColor" type="color" value="${esc(role.color||'#2f7cff')}" style="height:44px;padding:4px"></div>
      </div>
      <div class="form-group"><label>Discord Role ID</label>
        <input id="editRoleDiscordId" value="${esc(role.discordRoleId||'')}" placeholder="Leave blank to disable Discord role linking"></div>
      <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:#8fa0bd">Permissions</div>
      ${buildPermCheckboxes(role.permissions||[],'editperm')}`;
    qs('#modalConfirmBtn').textContent = 'Save Changes';
    qs('#modalConfirmBtn').onclick = async () => {
      const payload = {
        id,
        name: qs('#editRoleName').value.trim(),
        color: qs('#editRoleColor').value,
        discordRoleId: qs('#editRoleDiscordId').value.trim(),
        permissions: getSelectedPerms('editperm'),
      };
      if (!payload.name) { toast('Role name is required','#ff5a67'); return; }
      const r = await api('PUT','/api/adminRoles', payload);
      if (r.ok) {
        const idx = (store.adminRoles||[]).findIndex(x=>x.id===id);
        if (idx!==-1) store.adminRoles[idx] = r.data;
        renderAdminRoles();
        closeModal();
        toast('Role updated ✓');
      } else toast('Error: '+(r.reason||'failed'),'#ff5a67');
    };
    openModal();
  };

  window.deleteRole = async (id) => {
    if (!confirm('Delete this role? Members will lose access.')) return;
    const r = await api('DELETE','/api/adminRoles',{ id });
    if (r.ok) {
      store.adminRoles = (store.adminRoles||[]).filter(x=>x.id!==id);
      renderAdminRoles();
      toast('Role deleted','#ff5a67');
    } else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  window.addRoleMember = async (roleId) => {
    const input = qs(`#newMember_${roleId}`);
    const userId = input?.value.trim();
    if (!userId) { toast('Enter a Discord User ID','#ff5a67'); return; }
    const role = (store.adminRoles||[]).find(r=>r.id===roleId);
    if (!role) return;
    if ((role.members||[]).includes(userId)) { toast('User already in role','#f3c75a'); return; }
    const newMembers = [...(role.members||[]), userId];
    const r = await api('PUT','/api/adminRoles',{ id: roleId, members: newMembers });
    if (r.ok) {
      const idx = (store.adminRoles||[]).findIndex(x=>x.id===roleId);
      if (idx!==-1) store.adminRoles[idx] = r.data;
      renderAdminRoles();
      toast('Member added ✓');
    } else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  window.removeRoleMember = async (roleId, userId) => {
    const role = (store.adminRoles||[]).find(r=>r.id===roleId);
    if (!role) return;
    const newMembers = (role.members||[]).filter(m=>m!==userId);
    const r = await api('PUT','/api/adminRoles',{ id: roleId, members: newMembers });
    if (r.ok) {
      const idx = (store.adminRoles||[]).findIndex(x=>x.id===roleId);
      if (idx!==-1) store.adminRoles[idx] = r.data;
      renderAdminRoles();
      toast('Member removed','#f3c75a');
    } else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  function renderDiscordUsers(){
    const users = store.users || [];
    const rows = users.map(u=>`
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            ${u.avatar?`<img src="${esc(u.avatar)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover" alt="">`:'<div style="width:32px;height:32px;border-radius:50%;background:#1b2942;display:grid;place-items:center">'+esc((u.username||'?')[0].toUpperCase())+'</div>'}
            <b>${esc(u.username||'Unknown')}</b>
          </div>
         </td>
        <td style="font-size:12px;color:#8fa0bd">${esc(u.id||'')}</td>
        <td><span class="badge badge-${u.isAdmin?'warning':'info'}">${u.isAdmin?'Admin':'Officer'}</span></td>
        <td>${fmtTime(u.lastLogin)}</td>
        <td>${fmtTime(u.joinedAt)}</td>
      </tr>`).join('');
    qs('#discordUsers').innerHTML = `
      <div class="card">
        <div class="card-header"><h3><i class="ti ti-brand-discord"></i> Discord Users</h3>
          <span style="color:#8fa0bd;font-size:13px">${users.length} registered users</span>
        </div>
        <div class="card-body">
          <table><thead><tr><th>User</th><th>Discord ID</th><th>Role</th><th>Last Login</th><th>Joined</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="5" style="color:#8fa0bd;text-align:center">No users found</td>'}</tbody></table>
        </div>
      </div>`;
  }

  function renderLogs(){
    const activity = store.activity || [];
    const rows = activity.slice(0,100).map(a=>`
      <tr>
        <td>${esc(a.msg||'')}</td>
        <td><span class="badge badge-info">${esc(a.type||'system')}</span></td>
        <td>${fmtTime(a.time)}</td>
      </tr>`).join('');
    qs('#logs').innerHTML = `
      <div class="card">
        <div class="card-header"><h3><i class="ti ti-history"></i> System Logs</h3>
          <span style="color:#8fa0bd;font-size:13px">Showing last ${Math.min(100,activity.length)} entries</span>
        </div>
        <div class="card-body">
          <table><thead><tr><th>Message</th><th>Type</th><th>Date</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="3" style="color:#8fa0bd;text-align:center">No logs found</td>'}</tbody></table>
        </div>
      </div>`;
  }

  function renderSettings(){
    const settings = store.settings || { webhookUrl:'', logsEnabled:true };
    qs('#settings').innerHTML = `
      <div class="card">
        <div class="card-header"><h3><i class="ti ti-settings"></i> Settings</h3></div>
        <div class="card-body">
          <div class="form-group">
            <label>Discord Webhook URL</label>
            <input id="settingsWebhook" value="${esc(settings.webhookUrl||'')}" placeholder="https://discord.com/api/webhooks/...">
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:12px">
            <label style="margin:0">Enable Activity Logs</label>
            <input type="checkbox" id="settingsLogs" ${settings.logsEnabled?'checked':''} style="width:auto;padding:0;margin:0">
          </div>
          ${isAdmin?`<button class="btn btn-primary" onclick="saveSettings()"><i class="ti ti-device-floppy"></i> Save Settings</button>`:'<p style="color:#8fa0bd;font-size:13px">Only admins can change settings.</p>'}
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3><i class="ti ti-database"></i> Database</h3></div>
        <div class="card-body">
          <p style="color:#8fa0bd;margin-bottom:16px;font-size:13px">Reset the database to default seed data. This action cannot be undone.</p>
          ${isAdmin?`<button class="btn btn-danger" onclick="seedDatabase()"><i class="ti ti-refresh"></i> Reset to Defaults</button>`:''}
        </div>
      </div>`;
  }

  window.saveSettings = async () => {
    const payload = {
      webhookUrl: qs('#settingsWebhook').value.trim(),
      logsEnabled: qs('#settingsLogs').checked
    };
    const r = await api('PUT','/api/settings', payload);
    if(r.ok){ store.settings = r.data; toast('Settings saved ✓'); }
    else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  window.seedDatabase = async () => {
    if(!confirm('Reset ALL data to defaults? This cannot be undone!')) return;
    const r = await api('POST','/api/seed');
    if(r.ok){ await loadAllData(); navigate('dashboard'); toast('Database reset ✓','#f3c75a'); }
    else toast('Error: '+(r.reason||'failed'),'#ff5a67');
  };

  // ═══════════════════════════ INITIALIZATION ═══════════════════════════
  async function init(){
    const loginBtn = qs('#discordLoginBtn');
    if(loginBtn) loginBtn.onclick = loginDiscord;

    const logoutBtn = qs('#logoutBtn');
    if(logoutBtn) logoutBtn.onclick = () => { clearSession(); location.reload(); };

    const mobileBtn = qs('#mobileMenuBtn');
    if(mobileBtn) mobileBtn.onclick = () => qs('#sidebar')?.classList.toggle('open');

    const closeBtn = qs('#closeModalBtn');
    if(closeBtn) closeBtn.onclick = window.closeModal;
    const cancelBtn = qs('#modalCancelBtn');
    if(cancelBtn) cancelBtn.onclick = window.closeModal;

    const modal = qs('#globalModal');
    if(modal) modal.addEventListener('click', (e) => {
      if(e.target === modal) window.closeModal();
    });

    qsa('.nav button').forEach(b => {
      b.onclick = () => navigate(b.dataset.page);
    });

    setInterval(() => {
      const clockEl = qs('#clock');
      if(clockEl) clockEl.textContent = fmtTime(Date.now());
    }, 1000);

    // ✅ Step 1: تحقق من OAuth callback أو session محفوظة
    const oauthSuccess = await handleOAuth();
    console.log('[Init] OAuth callback result:', oauthSuccess);

    const sessionLoaded = oauthSuccess || loadSession();
    console.log('[Init] Session loaded:', sessionLoaded, '| user:', currentUser?.id || 'none');

    if(sessionLoaded){
      console.log('[Init] Validating session with server...');
      const serverOk = await validateSessionWithServer();
      console.log('[Init] Server validation result:', serverOk);

      if(!serverOk){
        console.warn('[Init] Server rejected session — showing login page');
        qs('#loginContainer').style.display = 'grid';
        qs('#appContainer').style.display   = 'none';
        if(!qs('#loginMessage').textContent) {
          qs('#loginMessage').textContent = 'Session expired or access revoked. Please login again.';
        }
        return;
      }

      console.log('[Init] ✅ Session valid — booting dashboard');
      bootApp();
      await loadAllData();
      navigate('dashboard');
      console.log('[Init] ✅ Redirecting to dashboard complete');
    } else {
      console.log('[Init] No session — showing login page');
    }
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
